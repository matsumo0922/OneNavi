<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OneNavi Dev Tools</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="map"></div>

    <div id="panel">
      <header class="panel-header">
        <span class="panel-title">Dev Tools</span>
        <span id="connection-status" class="badge disconnected">&#9679; Disconnected</span>
      </header>

      <div id="panel-search">
        <!-- PlaceAutocompleteElement が JS で挿入される -->
      </div>

      <section class="card">
        <div class="card-title">Route</div>
        <div class="provider-toggle" id="provider-toggle" role="group" aria-label="Route provider">
          <button class="provider-btn" data-provider="google">Google</button>
          <button class="provider-btn" data-provider="here">HERE</button>
        </div>
        <div id="waypoint-list" class="waypoint-list"></div>
        <p class="hint">地図をタップ、または検索で地点を追加</p>
        <div class="btn-group">
          <button id="btn-find-route" class="btn btn-primary">Find route</button>
          <button id="btn-clear" class="btn btn-ghost">Clear</button>
        </div>

        <div class="options" id="route-options">
          <button
            class="options-toggle"
            id="route-options-toggle"
            type="button"
            aria-expanded="false"
          >
            <span class="options-toggle-label">HERE options</span>
            <span class="options-caret">&#9656;</span>
          </button>
          <div class="options-body" id="route-options-body" hidden></div>
        </div>
      </section>

      <section class="card">
        <div class="card-title">Saved routes</div>
        <div id="saved-route-list" class="saved-route-list"></div>
        <button id="btn-save-route" class="btn btn-ghost full">Save current route</button>
      </section>

      <section class="card">
        <div class="card-title">Playback</div>
        <div class="transport">
          <button id="btn-play" class="icon-btn play" title="Play">&#9654;</button>
          <button id="btn-pause" class="icon-btn pause" title="Pause">&#10074;&#10074;</button>
          <button id="btn-stop" class="icon-btn stop" title="Stop">&#9632;</button>
          <button id="btn-restart" class="icon-btn" title="Restart">&#8634;</button>
        </div>
        <div id="progress-bar">
          <div id="progress-fill"></div>
        </div>

        <div class="field">
          <label>Speed <span class="unit">&times;</span></label>
          <div id="speed-buttons" class="segmented">
            <button class="speed-btn" data-speed="0.5">0.5</button>
            <button class="speed-btn active" data-speed="1">1</button>
            <button class="speed-btn" data-speed="2">2</button>
            <button class="speed-btn" data-speed="5">5</button>
            <button class="speed-btn" data-speed="10">10</button>
            <button class="speed-btn" data-speed="20">20</button>
          </div>
        </div>

        <div class="field">
          <label>Rate <span class="unit">Hz</span></label>
          <div id="rate-buttons" class="segmented">
            <button class="rate-btn" data-hz="1">1</button>
            <button class="rate-btn" data-hz="2">2</button>
            <button class="rate-btn" data-hz="5">5</button>
            <button class="rate-btn active" data-hz="10">10</button>
            <button class="rate-btn" data-hz="20">20</button>
          </div>
        </div>
      </section>

      <section class="card">
        <div class="card-title">Telemetry</div>
        <dl class="telemetry">
          <dt>Position</dt>
          <dd id="position-info">&mdash;</dd>
          <dt>Bearing</dt>
          <dd id="bearing-info">&mdash;</dd>
          <dt>Speed</dt>
          <dd id="speed-info">&mdash;</dd>
          <dt>Mode</dt>
          <dd id="mode-info">Idle</dd>
        </dl>
      </section>

      <section class="card">
        <div class="card-title">Import</div>
        <button id="btn-load-gpx" class="btn btn-ghost full">Load GPX file</button>
        <input id="gpx-file-input" type="file" accept=".gpx" hidden />
        <div id="drop-zone">Drop .gpx here</div>
      </section>

      <footer class="panel-footer">
        <span><kbd>&uarr;</kbd><kbd>&darr;</kbd><kbd>&larr;</kbd><kbd>&rarr;</kbd> Move</span>
        <span><kbd>Space</kbd> Pause / Resume</span>
      </footer>
    </div>

    <aside id="api-bench" class="bench collapsed">
      <header class="bench-header">
        <span class="bench-title">API Bench <em>HERE</em></span>
        <button id="bench-toggle" class="bench-toggle" aria-label="Toggle API bench">&#9776;</button>
      </header>
      <div class="bench-body">
        <div id="bench-presets" class="bench-presets"></div>
        <label class="bench-label" for="bench-url">
          Endpoint <span>apikey は自動付与</span>
        </label>
        <textarea id="bench-url" class="bench-url" rows="4" spellcheck="false"></textarea>
        <div class="bench-actions">
          <button id="bench-send" class="btn btn-primary">Send</button>
          <button id="bench-plot" class="btn btn-ghost">Plot</button>
          <button id="bench-clear-plot" class="btn btn-ghost">Clear plot</button>
        </div>
        <div id="bench-status" class="bench-status"></div>
        <pre id="bench-output" class="bench-output">// Send でレスポンスを表示</pre>
      </div>
    </aside>

    <section id="route-detail" class="detail hidden">
      <header class="detail-header">
        <nav class="detail-tabs" id="detail-tabs">
          <button class="detail-tab active" data-tab="summary" type="button">Summary</button>
          <button class="detail-tab" data-tab="turns" type="button">Turn-by-turn</button>
          <button class="detail-tab" data-tab="graph" type="button">Graph</button>
          <button class="detail-tab" data-tab="snaps" type="button">Snaps</button>
          <button class="detail-tab" data-tab="tolls" type="button">Tolls</button>
          <button class="detail-tab" data-tab="raw" type="button">Response</button>
        </nav>
        <button class="detail-collapse" id="detail-collapse" type="button" aria-label="Toggle detail">
          &#9662;
        </button>
      </header>
      <div class="detail-body" id="detail-body"></div>
    </section>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body { font-family: system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif; background: #e8edf1; color: #1c1b1f; }
      .map { position: relative; height: 100%; overflow: hidden; background: linear-gradient(135deg, #dfe7eb, #eef3f6); }
      .road { position: absolute; left: -10%; top: 42%; width: 125%; height: 76px; background: #717a80; transform: rotate(-18deg); }
      .route { position: absolute; left: 8%; top: 48%; width: 92%; height: 8px; background: #1a73e8; transform: rotate(-18deg); border-radius: 8px; }
      .tunnel { position: absolute; left: 34%; top: 37%; width: 45%; height: 122px; border: 3px dashed #263238; transform: rotate(-18deg); border-radius: 12px; opacity: .75; }
      .vehicle { position: absolute; left: 47%; top: 48%; width: 24px; height: 24px; border-radius: 50%; background: rgba(26,115,232,.58); border: 3px solid white; box-shadow: 0 0 0 8px rgba(26,115,232,.14); }
      .badge { position: absolute; left: 16px; top: 52px; padding: 8px 12px; border-radius: 8px; background: #ffd8a8; color: #3d2600; font-weight: 800; font-size: 13px; }
      .panel { position: absolute; left: 16px; right: 16px; bottom: 22px; background: white; border-radius: 16px; padding: 16px; box-shadow: 0 10px 28px rgba(0,0,0,.22); }
      .time { font-size: 34px; color: #16833a; font-weight: 900; }
      .summary { color: #667078; margin-top: 2px; }
      .speed { position: absolute; right: 16px; top: 18px; text-align: right; }
      .speed b { display: block; font-size: 28px; }
      .speed span { color: #667078; font-weight: 700; }
    </style>
  </head>
  <body>
    <main class="map">
      <div class="road"></div><div class="route"></div><div class="tunnel"></div><div class="vehicle"></div>
      <div class="badge">測位低下 · 推定走行中 8s</div>
      <section class="panel"><div class="time">18分</div><div class="summary">12 km · 18:42 着</div><div class="speed"><b>72</b><span>推定</span></div></section>
    </main>
  </body>
</html>

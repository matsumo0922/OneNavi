<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --accent: #1b6ef3;
        --surface: #ffffff;
        --bg: #eef1f5;
        --text: #1a1c1e;
        --muted: #6b7685;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .topbar {
        padding: 18px 20px;
        background: linear-gradient(120deg, #1b6ef3, #4a90ff);
        color: #fff;
      }
      .topbar h1 { margin: 0; font-size: 22px; font-weight: 800; letter-spacing: 0.02em; }
      .topbar p { margin: 4px 0 0; font-size: 13px; opacity: 0.85; }
      .search {
        margin: -22px 20px 0;
        background: var(--surface);
        border-radius: 14px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.12);
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 18px;
      }
      .search .icon { font-size: 20px; }
      .search span { color: var(--muted); font-size: 16px; }
      .map {
        flex: 1;
        margin: 18px 20px;
        border-radius: 16px;
        background:
          linear-gradient(0deg, rgba(0,0,0,0.04), rgba(0,0,0,0.04)),
          repeating-linear-gradient(0deg, #dde4ec, #dde4ec 1px, transparent 1px, transparent 28px),
          repeating-linear-gradient(90deg, #dde4ec, #dde4ec 1px, transparent 1px, transparent 28px),
          #e7edf3;
        position: relative;
        overflow: hidden;
      }
      .map .route {
        position: absolute;
        left: 20%; top: 70%;
        width: 60%; height: 3px;
        background: var(--accent);
        transform: rotate(-28deg);
        border-radius: 2px;
      }
      .map .pin {
        position: absolute;
        left: 74%; top: 26%;
        width: 16px; height: 16px;
        background: #e8453c;
        border: 3px solid #fff;
        border-radius: 50%;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      }
      .map .me {
        position: absolute;
        left: 22%; top: 68%;
        width: 14px; height: 14px;
        background: var(--accent);
        border: 3px solid #fff;
        border-radius: 50%;
      }
      .recents {
        background: var(--surface);
        border-radius: 18px 18px 0 0;
        padding: 18px 20px 24px;
        box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
      }
      .recents h2 { margin: 0 0 12px; font-size: 14px; color: var(--muted); font-weight: 700; }
      .item { display: flex; align-items: center; gap: 14px; padding: 12px 0; border-bottom: 1px solid #eef0f3; }
      .item:last-of-type { border-bottom: 0; }
      .item .badge { width: 38px; height: 38px; border-radius: 10px; background: #eaf1ff; color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 18px; }
      .item .text b { display: block; font-size: 15px; }
      .item .text small { color: var(--muted); font-size: 12px; }
      .cta {
        margin-top: 16px;
        width: 100%;
        padding: 16px;
        border: 0;
        border-radius: 14px;
        background: var(--accent);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1>OneNavi</h1>
      <p>どこへ向かいますか？</p>
    </div>

    <div class="search">
      <span class="icon">🔍</span>
      <span>目的地を検索</span>
    </div>

    <div class="map">
      <div class="route"></div>
      <div class="pin"></div>
      <div class="me"></div>
    </div>

    <div class="recents">
      <h2>最近の目的地</h2>
      <div class="item">
        <div class="badge">🏠</div>
        <div class="text"><b>自宅</b><small>東京都新宿区 · 12 km</small></div>
      </div>
      <div class="item">
        <div class="badge">🏢</div>
        <div class="text"><b>会社</b><small>東京都港区 · 8.4 km</small></div>
      </div>
      <div class="item">
        <div class="badge">⛰️</div>
        <div class="text"><b>道の駅 やまた</b><small>埼玉県秩父市 · 54 km</small></div>
      </div>
      <button class="cta">案内を開始</button>
    </div>
  </body>
</html>

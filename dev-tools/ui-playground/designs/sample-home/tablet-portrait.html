<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --accent: #1b6ef3;
        --surface: #ffffff;
        --bg: #eef1f5;
        --text: #1a1c1e;
        --muted: #6b7685;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        height: 100%;
        padding: 32px;
        gap: 24px;
      }
      .topbar { display: flex; align-items: center; justify-content: space-between; }
      .topbar h1 { margin: 0; font-size: 30px; font-weight: 800; }
      .search {
        flex: 1;
        max-width: 520px;
        margin-left: 32px;
        background: var(--surface);
        border-radius: 16px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        padding: 18px 22px;
        color: var(--muted);
        font-size: 18px;
      }
      .map {
        flex: 1;
        border-radius: 22px;
        background:
          repeating-linear-gradient(0deg, #dde4ec, #dde4ec 1px, transparent 1px, transparent 34px),
          repeating-linear-gradient(90deg, #dde4ec, #dde4ec 1px, transparent 1px, transparent 34px),
          #e7edf3;
        position: relative;
        overflow: hidden;
      }
      .map .route { position: absolute; left: 24%; top: 66%; width: 56%; height: 4px; background: var(--accent); transform: rotate(-26deg); border-radius: 2px; }
      .map .pin { position: absolute; left: 74%; top: 28%; width: 20px; height: 20px; background: #e8453c; border: 4px solid #fff; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
      .map .me { position: absolute; left: 25%; top: 64%; width: 18px; height: 18px; background: var(--accent); border: 4px solid #fff; border-radius: 50%; }
      .recents h2 { margin: 0 0 16px; font-size: 16px; color: var(--muted); font-weight: 700; }
      .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
      .tile { background: var(--surface); border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
      .tile .badge { width: 52px; height: 52px; border-radius: 14px; background: #eaf1ff; color: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 24px; }
      .tile b { display: block; font-size: 18px; }
      .tile small { color: var(--muted); font-size: 13px; }
      .cta { align-self: flex-end; padding: 18px 40px; border: 0; border-radius: 16px; background: var(--accent); color: #fff; font-size: 18px; font-weight: 700; }
    </style>
  </head>
  <body>
    <div class="topbar">
      <h1>OneNavi</h1>
      <div class="search">🔍 目的地を検索</div>
    </div>

    <div class="map">
      <div class="route"></div>
      <div class="pin"></div>
      <div class="me"></div>
    </div>

    <div class="recents">
      <h2>最近の目的地</h2>
      <div class="grid">
        <div class="tile"><div class="badge">🏠</div><div><b>自宅</b><small>新宿区 · 12 km</small></div></div>
        <div class="tile"><div class="badge">🏢</div><div><b>会社</b><small>港区 · 8.4 km</small></div></div>
        <div class="tile"><div class="badge">⛰️</div><div><b>道の駅 やまた</b><small>秩父市 · 54 km</small></div></div>
      </div>
    </div>

    <button class="cta">案内を開始</button>
  </body>
</html>

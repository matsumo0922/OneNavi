<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --maneuver: #0b3d91;        /* OneNavi ordinary maneuver banner (blue) */
        --eta-green: #1e8e3e;
        --text: #202124;
        --muted: #5f6368;
        --pill: #dde6f1;            /* selected action pill (light blue-gray) */
        --icon: #3c4043;
        --control: rgba(32, 33, 36, 0.86);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif;
        color: var(--text);
        position: relative;
        overflow: hidden;
        width: 412px;
        height: 915px;
        background: #e8eae5;
      }
      #map { position: absolute; inset: 0; display: block; }

      /* 上部 マニューババナー（既存 MapNavigationManeuverPanel 相当） */
      .maneuver {
        position: absolute;
        top: 14px; left: 14px; right: 14px;
        display: flex; align-items: center; gap: 14px;
        background: var(--maneuver);
        color: #fff;
        border-radius: 16px;
        padding: 14px 16px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.28);
      }
      .maneuver .turn { width: 46px; height: 46px; flex: 0 0 auto; }
      .maneuver .turn svg { width: 46px; height: 46px; }
      .maneuver .dist { font-size: 30px; font-weight: 700; line-height: 1; }
      .maneuver .dist span { font-size: 18px; font-weight: 600; margin-left: 4px; }
      .maneuver .street { font-size: 17px; font-weight: 500; margin-top: 4px; opacity: 0.95; }

      /* 右側 フローティングコントロール（MapControls 相当）。カードの上に逃がす。 */
      .fab {
        position: absolute; right: 16px; bottom: 196px;
        width: 52px; height: 52px; border-radius: 50%;
        background: #ffffff;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.28);
      }
      .fab svg { width: 26px; height: 26px; }

      /* 下部 ETA カード（本デザインの主役） */
      .eta-card {
        position: absolute; left: 14px; right: 14px; bottom: 30px;
        background: #ffffff;
        border-radius: 28px;
        padding: 16px 20px 14px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
      }
      .eta-min {
        font-size: 28px; font-weight: 700; line-height: 1;
        color: var(--eta-green);
      }
      .eta-min span { font-size: 19px; font-weight: 700; }
      .eta-sub { font-size: 19px; color: var(--muted); margin-top: 8px; }
      .eta-actions {
        display: flex; align-items: center; gap: 8px;
        margin-top: 16px;
      }
      .act {
        width: 52px; height: 52px; border-radius: 26px;
        display: flex; align-items: center; justify-content: center;
        flex: 0 0 auto;
      }
      .act.selected { background: var(--pill); width: 64px; }
      .act svg { width: 26px; height: 26px; }
      .spacer { flex: 1 1 auto; }
    </style>
  </head>
  <body>
    <canvas id="map"></canvas>

    <!-- 上部 マニューババナー -->
    <div class="maneuver">
      <div class="turn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 20 V11 a4 4 0 0 1 4 -4 h4" /><path d="M14 3 l4 4 l-4 4" />
        </svg>
      </div>
      <div>
        <div class="dist">300<span>m</span></div>
        <div class="street">中央町 交差点を右折</div>
      </div>
    </div>

    <!-- 右側 フローティングコントロール（再センタリング） -->
    <div class="fab" aria-label="再センタリング">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3.2" /><path d="M12 2v3 M12 19v3 M2 12h3 M19 12h3" />
      </svg>
    </div>

    <!-- 下部 ETA カード -->
    <div class="eta-card">
      <div class="eta-min">8<span>分</span></div>
      <div class="eta-sub">4.7 km · 0:25</div>
      <div class="eta-actions">
        <!-- 案内終了（選択中ピル） -->
        <div class="act selected" aria-label="案内終了">
          <svg viewBox="0 0 24 24" fill="none" stroke="#202124" stroke-width="2.2" stroke-linecap="round"><path d="M6 6 L18 18 M18 6 L6 18"/></svg>
        </div>
        <div class="spacer"></div>
        <!-- 別ルート（分岐） -->
        <div class="act" aria-label="別ルート">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--icon)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 21 V13"/><path d="M12 13 C12 9 8 9 7 5"/><path d="M12 13 C12 9 16 9 17 5"/>
            <path d="M5 7 L7 4 L9 7"/><path d="M15 7 L17 4 L19 7"/>
          </svg>
        </div>
        <div class="spacer"></div>
        <!-- 経由地を追加 -->
        <div class="act" aria-label="経由地を追加">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--icon)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 8v8 M8 12h8"/></svg>
        </div>
        <div class="spacer"></div>
        <!-- 迂回ルート -->
        <div class="act" aria-label="迂回ルート">
          <svg viewBox="0 0 24 24" fill="none" stroke="var(--icon)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="6" cy="19" r="1.8"/>
            <path d="M6 17 C6 11 18 13 18 8"/>
            <path d="M18 9 C16.6 9 15.5 7.9 15.5 6.5 C15.5 5 18 2.5 18 2.5 C18 2.5 20.5 5 20.5 6.5 C20.5 7.9 19.4 9 18 9 Z" fill="var(--icon)" stroke="none"/>
          </svg>
        </div>
        <div class="spacer"></div>
        <!-- その他 -->
        <div class="act" aria-label="その他">
          <svg viewBox="0 0 24 24" fill="var(--icon)"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const DESIGN_W = 412, DESIGN_H = 915;
        const canvas = document.getElementById("map");
        const cssW = window.innerWidth || DESIGN_W;
        const cssH = window.innerHeight || DESIGN_H;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.round(cssW * dpr);
        canvas.height = Math.round(cssH * dpr);
        canvas.style.width = cssW + "px";
        canvas.style.height = cssH + "px";
        const ctx = canvas.getContext("2d");
        ctx.setTransform((dpr * cssW) / DESIGN_W, 0, 0, (dpr * cssH) / DESIGN_H, 0, 0);

        let seed = 424242;
        const rnd = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; };
        const W = DESIGN_W, H = DESIGN_H;

        ctx.fillStyle = "#e9eae4"; ctx.fillRect(0, 0, W, H);

        const parks = [[70, 240, 90, 70], [330, 360, 80, 60], [110, 640, 70, 55], [320, 720, 95, 80]];
        ctx.fillStyle = "#cfe8cf";
        for (const [px, py, prx, pry] of parks) { ctx.beginPath(); ctx.ellipse(px, py, prx, pry, 0, 0, Math.PI * 2); ctx.fill(); }
        const inPark = (x, y) => parks.some(([px, py, prx, pry]) => ((x - px) / prx) ** 2 + ((y - py) / pry) ** 2 < 1);

        const shades = ["#dad9d3", "#d3d2cb", "#deddd7", "#d7d4cb", "#cecdc6"];
        for (let gx = -10; gx < W + 20; gx += 16) {
          for (let gy = -10; gy < H + 20; gy += 16) {
            if (rnd() > 0.6) continue;
            const bx = gx + rnd() * 3, by = gy + rnd() * 3;
            if (inPark(bx, by)) continue;
            const bw = 7 + rnd() * 8, bh = 7 + rnd() * 8;
            ctx.fillStyle = "#c6c5bd"; ctx.fillRect(bx + 1.2, by + 1.2, bw, bh);
            ctx.fillStyle = shades[(rnd() * shades.length) | 0]; ctx.fillRect(bx, by, bw, bh);
          }
        }

        // 水路
        ctx.strokeStyle = "#a9d3f0"; ctx.lineWidth = 26; ctx.lineCap = "round";
        ctx.beginPath(); ctx.moveTo(-20, 470); ctx.bezierCurveTo(120, 430, 200, 520, 412, 480); ctx.stroke();

        const drawRoads = (lines, width, color) => {
          ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap = "round"; ctx.lineJoin = "round";
          for (const pts of lines) { ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]); for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]); ctx.stroke(); }
        };
        const minor = [];
        for (let i = -1; i < 8; i++) { const x = i * 64 + 20; minor.push([[x + 14, -20], [x, H + 20]]); }
        for (let i = -1; i < 16; i++) { const y = i * 66 + 30; minor.push([[-20, y], [W + 20, y - 14]]); }
        drawRoads(minor, 7, "#f4f4ef");
        drawRoads([[[-20, 180], [220, 162], [432, 180]], [[-20, 560], [220, 540], [432, 560]], [[160, -20], [196, 460], [240, 915]]], 14, "#ffffff");

        // 案内ルート（一般道＝緑系 polyline）
        const route = [[206, 760], [202, 660], [200, 560], [206, 470], [214, 380], [212, 300], [196, 210], [176, 130], [150, 50]];
        const tracePath = () => {
          ctx.beginPath(); ctx.moveTo(route[0][0], route[0][1]);
          for (let i = 1; i < route.length - 1; i++) { const mx = (route[i][0] + route[i + 1][0]) / 2, my = (route[i][1] + route[i + 1][1]) / 2; ctx.quadraticCurveTo(route[i][0], route[i][1], mx, my); }
          const last = route[route.length - 1]; ctx.lineTo(last[0], last[1]);
        };
        ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 24; tracePath(); ctx.stroke();
        ctx.strokeStyle = "#146c34"; ctx.lineWidth = 16; tracePath(); ctx.stroke();
        ctx.strokeStyle = "#8bd24a"; ctx.lineWidth = 7; tracePath(); ctx.stroke();

        // 自車パック
        const cx = 206, cy = 760;
        ctx.fillStyle = "rgba(26,115,232,0.16)"; ctx.beginPath(); ctx.arc(cx, cy, 30, 0, Math.PI * 2); ctx.fill();
        ctx.save(); ctx.translate(cx, cy);
        ctx.fillStyle = "#1a73e8"; ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 3; ctx.lineJoin = "round";
        ctx.beginPath(); ctx.moveTo(0, -22); ctx.lineTo(14, 16); ctx.lineTo(0, 7); ctx.lineTo(-14, 16); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.restore();

        ctx.fillStyle = "#5f6368"; ctx.font = "13px system-ui"; ctx.textAlign = "left";
        for (const [t, lx, ly] of [["中央町", 232, 250], ["本通り", 60, 400], ["緑ヶ丘", 300, 600], ["川端町", 120, 520]]) ctx.fillText(t, lx, ly);
      })();
    </script>
  </body>
</html>

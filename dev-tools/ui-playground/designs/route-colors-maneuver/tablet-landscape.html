<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --bg: #eef2f4;
        --surface: #ffffff;
        --text: #1f2933;
        --muted: #65717d;
        --highway-poly-border: #1a56c7;
        --highway-poly-body: #5ab7ff;
        --ordinary-poly-border: #146c34;
        --ordinary-poly-body: #8bd24a;
        --callout: #1a73e8;
        --highway-maneuver: #005c46;
        --highway-maneuver-container: #003c2f;
        --ordinary-maneuver: #0b3d91;
        --ordinary-maneuver-container: #082b66;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        width: 1280px;
        height: 800px;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif;
      }
      .screen { display: grid; grid-template-columns: 300px 1fr; gap: 22px; height: 100%; padding: 24px; }
      .header, .map-card, .swatches { border-radius: 22px; box-shadow: 0 5px 22px rgba(23, 31, 38, 0.13); }
      .header { display: flex; flex-direction: column; justify-content: space-between; background: var(--surface); padding: 24px; }
      .title { margin: 0; font-size: 29px; line-height: 1.16; font-weight: 800; }
      .subtitle { margin: 12px 0 0; color: var(--muted); font-size: 15px; line-height: 1.5; }
      .swatches { display: grid; gap: 12px; margin-top: 22px; padding: 14px; background: #f8fafb; box-shadow: none; }
      .swatch { display: grid; grid-template-columns: 48px 1fr; align-items: center; gap: 12px; min-height: 50px; }
      .chip { height: 32px; border-radius: 999px; }
      .name { font-size: 13px; font-weight: 800; line-height: 1.2; }
      .value { color: var(--muted); font-size: 12px; }
      .content { display: grid; grid-template-columns: repeat(2, 1fr); gap: 22px; min-width: 0; }
      .map-card { position: relative; overflow: hidden; background:
        repeating-linear-gradient(35deg, transparent 0 50px, rgba(103, 116, 134, 0.14) 51px 60px, transparent 61px 112px),
        repeating-linear-gradient(115deg, transparent 0 60px, rgba(103, 116, 134, 0.12) 61px 70px, transparent 71px 128px),
        radial-gradient(circle at 18% 74%, #cdeecf 0 13%, transparent 14%),
        radial-gradient(circle at 82% 26%, #d4efd2 0 15%, transparent 16%),
        #f8faf6;
      }
      .map-card::before { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(255,255,255,0.62), transparent 45%, rgba(255,255,255,0.44)); }
      .section-label { position: absolute; left: 26px; top: 22px; z-index: 2; font-size: 14px; font-weight: 800; color: var(--muted); letter-spacing: 0.04em; }
      .route { position: absolute; left: -90px; right: -90px; top: 440px; height: 38px; transform: rotate(-38deg); z-index: 1; }
      .route .border, .route .body { position: absolute; left: 0; right: 0; top: 50%; border-radius: 999px; transform: translateY(-50%); }
      .route .border { height: 32px; background: var(--highway-poly-border); }
      .route .body { height: 22px; background: var(--highway-poly-body); }
      .map-card.ordinary .route .border { background: var(--ordinary-poly-border); }
      .map-card.ordinary .route .body { background: var(--ordinary-poly-body); }
      .maneuver { position: absolute; left: 30px; right: 30px; top: 72px; z-index: 3; display: grid; grid-template-columns: 64px 1fr; align-items: center; gap: 20px; min-height: 122px; padding: 22px 28px; border-radius: 22px; background: var(--highway-maneuver); color: #fff; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25); }
      .map-card.ordinary .maneuver { background: var(--ordinary-maneuver); }
      .turn, .turn svg { width: 64px; height: 64px; }
      .distance { font-size: 40px; font-weight: 800; line-height: 1; }
      .street { margin-top: 8px; font-size: 23px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .followup { position: absolute; left: 30px; top: 194px; z-index: 3; display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-radius: 0 0 20px 20px; color: #e8fff5; background: var(--highway-maneuver-container); font-size: 22px; font-weight: 700; }
      .map-card.ordinary .followup { color: #eaf2ff; background: var(--ordinary-maneuver-container); }
      .callout { position: absolute; left: 330px; bottom: 112px; z-index: 3; padding: 12px 19px; border-radius: 12px; background: var(--callout); color: #fff; font-size: 19px; font-weight: 800; box-shadow: 0 5px 18px rgba(0, 0, 0, 0.22); }
      .arrow-line { position: absolute; left: 260px; bottom: 82px; width: 138px; height: 44px; z-index: 2; transform: rotate(-38deg); }
      .arrow-line::before { content: ""; position: absolute; left: 0; right: 12px; top: 18px; height: 17px; border-radius: 999px; background: var(--highway-maneuver); }
      .arrow-line::after { content: ""; position: absolute; right: 0; top: 5px; width: 0; height: 0; border-top: 21px solid transparent; border-bottom: 21px solid transparent; border-left: 38px solid var(--highway-maneuver); }
      .map-card.ordinary .arrow-line::before { background: var(--ordinary-maneuver); }
      .map-card.ordinary .arrow-line::after { border-left-color: var(--ordinary-maneuver); }
      .arrow-core { position: absolute; left: 14px; right: 29px; top: 22px; height: 8px; border-radius: 999px; background: #fff; z-index: 4; }
      .map-card.ordinary .section-label::after { content: " / ORDINARY"; }
      .map-card.highway .section-label::after { content: " / HIGHWAY"; }
    </style>
  </head>
  <body>
    <main class="screen">
      <section class="header">
        <div>
          <h1 class="title">RouteColors / Maneuver</h1>
          <p class="subtitle">Polyline と CallOut は維持し、案内バナーと route 上矢印だけ濃色へ分離する。</p>
        </div>
        <section class="swatches">
          <div class="swatch"><div class="chip" style="background:#1a73e8"></div><div><div class="name">CallOut</div><div class="value">#1A73E8</div></div></div>
          <div class="swatch"><div class="chip" style="background:#005c46"></div><div><div class="name">Highway maneuver</div><div class="value">#005C46</div></div></div>
          <div class="swatch"><div class="chip" style="background:#0b3d91"></div><div><div class="name">Ordinary maneuver</div><div class="value">#0B3D91</div></div></div>
          <div class="swatch"><div class="chip" style="background:#5ab7ff"></div><div><div class="name">Polyline body</div><div class="value">existing</div></div></div>
        </section>
      </section>
      <section class="content">
        <article class="map-card highway">
          <div class="section-label">Maneuver</div>
          <div class="route"><span class="border"></span><span class="body"></span></div>
          <div class="maneuver"><div class="turn"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V5"/><path d="M5.5 11.5 12 5l6.5 6.5"/></svg></div><div><div class="distance">800 m</div><div class="street">高速入口 方面</div></div></div>
          <div class="followup">その後、左折</div>
          <div class="arrow-line"><span class="arrow-core"></span></div>
          <div class="callout">高速</div>
        </article>
        <article class="map-card ordinary">
          <div class="section-label">Maneuver</div>
          <div class="route"><span class="border"></span><span class="body"></span></div>
          <div class="maneuver"><div class="turn"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V5"/><path d="M5.5 11.5 12 5l6.5 6.5"/></svg></div><div><div class="distance">300 m</div><div class="street">都道68号 方面</div></div></div>
          <div class="followup">その後、右折</div>
          <div class="arrow-line"><span class="arrow-core"></span></div>
          <div class="callout">都道68号</div>
        </article>
      </section>
    </main>
  </body>
</html>

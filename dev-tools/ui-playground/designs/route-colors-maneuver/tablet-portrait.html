<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --bg: #eef2f4;
        --surface: #ffffff;
        --text: #1f2933;
        --muted: #65717d;
        --highway-poly-border: #1a56c7;
        --highway-poly-body: #5ab7ff;
        --ordinary-poly-border: #146c34;
        --ordinary-poly-body: #8bd24a;
        --callout: #1a73e8;
        --highway-maneuver: #005c46;
        --highway-maneuver-container: #003c2f;
        --ordinary-maneuver: #0b3d91;
        --ordinary-maneuver-container: #082b66;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        width: 800px;
        height: 1280px;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif;
      }
      .screen { display: grid; grid-template-rows: auto 1fr auto; gap: 20px; height: 100%; padding: 26px; }
      .header, .map-card, .swatches { border-radius: 22px; box-shadow: 0 5px 22px rgba(23, 31, 38, 0.13); }
      .header { background: var(--surface); padding: 24px; }
      .title { margin: 0; font-size: 30px; line-height: 1.15; font-weight: 800; }
      .subtitle { margin: 10px 0 0; color: var(--muted); font-size: 16px; line-height: 1.5; }
      .content { display: grid; gap: 20px; min-height: 0; }
      .map-card { position: relative; overflow: hidden; background:
        repeating-linear-gradient(35deg, transparent 0 44px, rgba(103, 116, 134, 0.14) 45px 53px, transparent 54px 100px),
        repeating-linear-gradient(115deg, transparent 0 52px, rgba(103, 116, 134, 0.12) 53px 61px, transparent 62px 112px),
        radial-gradient(circle at 20% 24%, #cdeecf 0 13%, transparent 14%),
        radial-gradient(circle at 78% 72%, #d4efd2 0 15%, transparent 16%),
        #f8faf6;
      }
      .map-card::before { content: ""; position: absolute; inset: 0; background: linear-gradient(90deg, rgba(255,255,255,0.62), transparent 40%, rgba(255,255,255,0.44)); }
      .section-label { position: absolute; left: 24px; top: 20px; z-index: 2; font-size: 14px; font-weight: 800; color: var(--muted); letter-spacing: 0.04em; }
      .route { position: absolute; left: -82px; right: -78px; top: 246px; height: 34px; transform: rotate(-35deg); z-index: 1; }
      .route .border, .route .body { position: absolute; left: 0; right: 0; top: 50%; border-radius: 999px; transform: translateY(-50%); }
      .route .border { height: 30px; background: var(--highway-poly-border); }
      .route .body { height: 20px; background: var(--highway-poly-body); }
      .map-card.ordinary .route .border { background: var(--ordinary-poly-border); }
      .map-card.ordinary .route .body { background: var(--ordinary-poly-body); }
      .maneuver { position: absolute; left: 28px; right: 28px; top: 62px; z-index: 3; display: grid; grid-template-columns: 58px 1fr; align-items: center; gap: 18px; min-height: 112px; padding: 20px 24px; border-radius: 20px; background: var(--highway-maneuver); color: #fff; box-shadow: 0 10px 28px rgba(0, 0, 0, 0.25); }
      .map-card.ordinary .maneuver { background: var(--ordinary-maneuver); }
      .turn, .turn svg { width: 58px; height: 58px; }
      .distance { font-size: 36px; font-weight: 800; line-height: 1; }
      .street { margin-top: 7px; font-size: 21px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .followup { position: absolute; left: 28px; top: 174px; z-index: 3; display: flex; align-items: center; gap: 10px; padding: 13px 18px; border-radius: 0 0 18px 18px; color: #e8fff5; background: var(--highway-maneuver-container); font-size: 20px; font-weight: 700; }
      .map-card.ordinary .followup { color: #eaf2ff; background: var(--ordinary-maneuver-container); }
      .callout { position: absolute; left: 404px; bottom: 108px; z-index: 3; padding: 11px 18px; border-radius: 12px; background: var(--callout); color: #fff; font-size: 18px; font-weight: 800; box-shadow: 0 5px 18px rgba(0, 0, 0, 0.22); }
      .arrow-line { position: absolute; left: 330px; bottom: 78px; width: 128px; height: 42px; z-index: 2; transform: rotate(-35deg); }
      .arrow-line::before { content: ""; position: absolute; left: 0; right: 12px; top: 17px; height: 16px; border-radius: 999px; background: var(--highway-maneuver); }
      .arrow-line::after { content: ""; position: absolute; right: 0; top: 5px; width: 0; height: 0; border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-left: 36px solid var(--highway-maneuver); }
      .map-card.ordinary .arrow-line::before { background: var(--ordinary-maneuver); }
      .map-card.ordinary .arrow-line::after { border-left-color: var(--ordinary-maneuver); }
      .arrow-core { position: absolute; left: 13px; right: 27px; top: 21px; height: 8px; border-radius: 999px; background: #fff; z-index: 4; }
      .map-card.ordinary .section-label::after { content: " / ORDINARY"; }
      .map-card.highway .section-label::after { content: " / HIGHWAY"; }
      .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 14px; background: var(--surface); }
      .swatch { min-height: 84px; border-radius: 16px; padding: 12px; background: #f8fafb; }
      .chip { width: 100%; height: 24px; border-radius: 999px; margin-bottom: 10px; }
      .name { font-size: 13px; font-weight: 800; line-height: 1.25; }
      .value { margin-top: 3px; color: var(--muted); font-size: 12px; }
    </style>
  </head>
  <body>
    <main class="screen">
      <section class="header">
        <h1 class="title">RouteColors / Maneuver</h1>
        <p class="subtitle">Polyline と CallOut は維持し、案内バナーと route 上矢印だけ濃色へ分離する。</p>
      </section>
      <section class="content">
        <article class="map-card highway">
          <div class="section-label">Maneuver</div>
          <div class="route"><span class="border"></span><span class="body"></span></div>
          <div class="maneuver"><div class="turn"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V5"/><path d="M5.5 11.5 12 5l6.5 6.5"/></svg></div><div><div class="distance">800 m</div><div class="street">高速入口 方面</div></div></div>
          <div class="followup">その後、左折</div>
          <div class="arrow-line"><span class="arrow-core"></span></div>
          <div class="callout">高速</div>
        </article>
        <article class="map-card ordinary">
          <div class="section-label">Maneuver</div>
          <div class="route"><span class="border"></span><span class="body"></span></div>
          <div class="maneuver"><div class="turn"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V5"/><path d="M5.5 11.5 12 5l6.5 6.5"/></svg></div><div><div class="distance">300 m</div><div class="street">都道68号 方面</div></div></div>
          <div class="followup">その後、右折</div>
          <div class="arrow-line"><span class="arrow-core"></span></div>
          <div class="callout">都道68号</div>
        </article>
      </section>
      <section class="swatches">
        <div class="swatch"><div class="chip" style="background:#1a73e8"></div><div class="name">CallOut</div><div class="value">#1A73E8</div></div>
        <div class="swatch"><div class="chip" style="background:#005c46"></div><div class="name">Highway maneuver</div><div class="value">#005C46</div></div>
        <div class="swatch"><div class="chip" style="background:#0b3d91"></div><div class="name">Ordinary maneuver</div><div class="value">#0B3D91</div></div>
        <div class="swatch"><div class="chip" style="background:#5ab7ff"></div><div class="name">Polyline body</div><div class="value">existing</div></div>
      </section>
    </main>
  </body>
</html>

<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        width: 915px;
        height: 412px;
        overflow: hidden;
        font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
        color: #1c1b1f;
        background: #d9e5da;
      }
      .screen {
        position: relative;
        width: 915px;
        height: 412px;
        background:
          linear-gradient(24deg, transparent 0 44%, rgba(255,255,255,0.92) 44.2% 50%, transparent 50.2%),
          linear-gradient(111deg, transparent 0 54%, rgba(255,255,255,0.78) 54.2% 59%, transparent 59.2%),
          linear-gradient(0deg, rgba(88, 130, 96, 0.18) 0 1px, transparent 1px 96px),
          linear-gradient(90deg, rgba(88, 130, 96, 0.16) 0 1px, transparent 1px 96px),
          #d9e5da;
        background-size: auto, auto, 96px 96px, 96px 96px, auto;
      }
      .top-panel {
        position: absolute;
        top: 18px;
        left: 18px;
        display: flex;
        align-items: center;
        gap: 12px;
        width: 390px;
        min-height: 92px;
        padding: 14px;
        border-radius: 8px;
        background: #fefbff;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.16);
      }
      .turn {
        display: grid;
        place-items: center;
        width: 62px;
        height: 62px;
        color: #ffffff;
        font-size: 35px;
        font-weight: 800;
        border-radius: 8px;
        background: #1f7a3f;
      }
      .distance {
        font-size: 29px;
        font-weight: 850;
        line-height: 1;
      }
      .road {
        margin-top: 4px;
        font-size: 15px;
        color: #5f5d63;
      }
      .speed-stack {
        position: absolute;
        top: 124px;
        left: 18px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .speed-card {
        display: flex;
        align-items: baseline;
        gap: 5px;
        min-width: 112px;
        padding: 8px 12px 10px;
        border-radius: 8px;
        color: #ffffff;
        background: rgba(24, 28, 25, 0.9);
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.24);
      }
      .speed-value {
        font-size: 34px;
        font-weight: 850;
        line-height: 1;
        letter-spacing: 0;
      }
      .speed-unit {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
      }
      .limit-sign {
        display: grid;
        place-items: center;
        width: 58px;
        height: 58px;
        border: 5px solid #d5222a;
        border-radius: 50%;
        color: #1c1b1f;
        background: #ffffff;
        font-size: 23px;
        font-weight: 850;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      }
      .controls {
        position: absolute;
        top: 18px;
        right: 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .control {
        display: grid;
        place-items: center;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: #fefbff;
        color: #38363b;
        font-size: 24px;
        font-weight: 800;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
      }
      .eta-card {
        position: absolute;
        left: 18px;
        right: 18px;
        bottom: 14px;
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 14px 16px;
        border-radius: 8px;
        background: #fefbff;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.18);
      }
      .eta-main {
        font-size: 30px;
        font-weight: 850;
        color: #1b7f45;
      }
      .eta-sub {
        font-size: 15px;
        color: #5f5d63;
      }
      .traffic {
        flex: 1;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(90deg, #1b7f45 0 55%, #f2b23a 55% 72%, #d64242 72% 100%);
      }
    </style>
  </head>
  <body>
    <main class="screen">
      <section class="top-panel">
        <div class="turn">↱</div>
        <div>
          <div class="distance">300 m</div>
          <div class="road">青山通りを左方向</div>
        </div>
      </section>

      <section class="speed-stack" aria-label="速度">
        <div class="speed-card">
          <span class="speed-value">48</span>
          <span class="speed-unit">km/h</span>
        </div>
        <div class="limit-sign" aria-label="制限速度 50 km/h">50</div>
      </section>

      <nav class="controls" aria-label="地図操作">
        <div class="control">+</div>
        <div class="control">−</div>
      </nav>

      <section class="eta-card">
        <div class="eta-main">18分</div>
        <div class="eta-sub">8.4 km · 12:48 到着予定</div>
        <div class="traffic"></div>
      </section>
    </main>
  </body>
</html>

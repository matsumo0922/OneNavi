<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        width: 412px;
        height: 915px;
        overflow: hidden;
        font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
        color: #1c1b1f;
        background: #d9e5da;
      }
      .screen {
        position: relative;
        width: 412px;
        height: 915px;
        background:
          linear-gradient(27deg, transparent 0 43%, rgba(255,255,255,0.92) 43.2% 50%, transparent 50.2%),
          linear-gradient(118deg, transparent 0 58%, rgba(255,255,255,0.78) 58.2% 63%, transparent 63.2%),
          linear-gradient(0deg, rgba(88, 130, 96, 0.18) 0 1px, transparent 1px 96px),
          linear-gradient(90deg, rgba(88, 130, 96, 0.16) 0 1px, transparent 1px 96px),
          #d9e5da;
        background-size: auto, auto, 96px 96px, 96px 96px, auto;
      }
      .top-panel {
        position: absolute;
        top: 20px;
        left: 16px;
        right: 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 96px;
        padding: 14px;
        border-radius: 8px;
        background: #fefbff;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.16);
      }
      .turn {
        display: grid;
        place-items: center;
        width: 64px;
        height: 64px;
        color: #ffffff;
        font-size: 36px;
        font-weight: 800;
        border-radius: 8px;
        background: #1f7a3f;
      }
      .top-text {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .distance {
        font-size: 30px;
        font-weight: 800;
        line-height: 1;
      }
      .road {
        font-size: 15px;
        color: #5f5d63;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .speed-row {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .speed-current {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        min-width: 52px;
      }
      .speed-value {
        font-size: 18px;
        font-weight: 850;
        line-height: 1;
        letter-spacing: 0;
      }
      .speed-label {
        margin-top: 2px;
        font-size: 13px;
        color: #5f5d63;
        letter-spacing: 0;
      }
      .limit-sign {
        display: grid;
        place-items: center;
        width: 48px;
        height: 48px;
        border: 3px solid #d5222a;
        border-radius: 50%;
        color: #1c1b1f;
        background: #ffffff;
        font-size: 20px;
        font-weight: 850;
      }
      .eta-card {
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: 18px;
        padding: 16px;
        border-radius: 8px;
        background: #fefbff;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.18);
      }
      .eta-top {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .eta-text {
        min-width: 0;
      }
      .eta-main {
        font-size: 30px;
        font-weight: 850;
        color: #1b7f45;
      }
      .eta-sub {
        margin-top: 2px;
        font-size: 15px;
        color: #5f5d63;
      }
      .eta-actions {
        display: flex;
        justify-content: flex-end;
        gap: 4px;
        margin-top: 12px;
      }
      .action {
        display: grid;
        place-items: center;
        width: 48px;
        height: 48px;
        border-radius: 50%;
        color: #5f5d63;
        font-size: 20px;
        font-weight: 800;
      }
      .action-close {
        width: 64px;
        color: #241a00;
        background: #ffdea8;
      }
    </style>
  </head>
  <body>
    <main class="screen">
      <section class="top-panel">
        <div class="turn">↱</div>
        <div class="top-text">
          <div class="distance">300 m</div>
          <div class="road">青山通りを左方向</div>
        </div>
      </section>

      <section class="eta-card">
        <div class="eta-top">
          <div class="eta-text">
            <div class="eta-main">18分</div>
            <div class="eta-sub">8.4 km · 12:48 到着予定</div>
          </div>
          <div class="speed-row" aria-label="速度">
            <div class="limit-sign" aria-label="制限速度 50 km/h">50</div>
            <div class="speed-current" aria-label="現在速度 48 km/h">
              <div class="speed-value">48km</div>
              <div class="speed-label">speed</div>
            </div>
          </div>
        </div>
        <nav class="eta-actions" aria-label="ナビ操作">
          <div class="action">⇄</div>
          <div class="action">＋</div>
          <div class="action">↗</div>
          <div class="action action-close">×</div>
        </nav>
      </section>
    </main>
  </body>
</html>

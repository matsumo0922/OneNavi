<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        width: 1280px;
        height: 800px;
        overflow: hidden;
        font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
        color: #1c1b1f;
        background: #d9e5da;
      }
      .screen {
        position: relative;
        width: 1280px;
        height: 800px;
        background:
          linear-gradient(24deg, transparent 0 43%, rgba(255,255,255,0.92) 43.2% 49%, transparent 49.2%),
          linear-gradient(111deg, transparent 0 55%, rgba(255,255,255,0.78) 55.2% 60%, transparent 60.2%),
          linear-gradient(0deg, rgba(88, 130, 96, 0.18) 0 1px, transparent 1px 112px),
          linear-gradient(90deg, rgba(88, 130, 96, 0.16) 0 1px, transparent 1px 112px),
          #d9e5da;
        background-size: auto, auto, 112px 112px, 112px 112px, auto;
      }
      .panel {
        position: absolute;
        top: 0;
        right: 0;
        width: 400px;
        height: 800px;
        background: rgba(254, 251, 255, 0.98);
        border-left: 1px solid rgba(86, 82, 91, 0.18);
      }
      .top-panel {
        position: absolute;
        top: 24px;
        right: 24px;
        width: 352px;
        display: flex;
        align-items: center;
        gap: 16px;
        min-height: 108px;
        padding: 16px;
        border-radius: 8px;
        background: #fefbff;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.14);
      }
      .turn {
        display: grid;
        place-items: center;
        width: 72px;
        height: 72px;
        color: #ffffff;
        font-size: 42px;
        font-weight: 800;
        border-radius: 8px;
        background: #1f7a3f;
      }
      .distance {
        font-size: 36px;
        font-weight: 850;
        line-height: 1;
      }
      .road {
        margin-top: 6px;
        font-size: 18px;
        color: #5f5d63;
      }
      .speed-stack {
        position: absolute;
        top: 24px;
        left: 24px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .speed-card {
        display: flex;
        align-items: baseline;
        gap: 6px;
        min-width: 132px;
        padding: 10px 14px 12px;
        border-radius: 8px;
        color: #ffffff;
        background: rgba(24, 28, 25, 0.9);
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.24);
      }
      .speed-value {
        font-size: 40px;
        font-weight: 850;
        line-height: 1;
        letter-spacing: 0;
      }
      .speed-unit {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0;
      }
      .limit-sign {
        display: grid;
        place-items: center;
        width: 68px;
        height: 68px;
        border: 6px solid #d5222a;
        border-radius: 50%;
        color: #1c1b1f;
        background: #ffffff;
        font-size: 27px;
        font-weight: 850;
        box-shadow: 0 5px 18px rgba(0, 0, 0, 0.2);
      }
      .eta-card {
        position: absolute;
        right: 24px;
        bottom: 24px;
        width: 352px;
        padding: 18px;
        border-radius: 8px;
        background: #fefbff;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.14);
      }
      .eta-main {
        font-size: 36px;
        font-weight: 850;
        color: #1b7f45;
      }
      .eta-sub {
        margin-top: 4px;
        font-size: 18px;
        color: #5f5d63;
      }
      .traffic {
        height: 10px;
        margin-top: 16px;
        border-radius: 999px;
        background: linear-gradient(90deg, #1b7f45 0 55%, #f2b23a 55% 72%, #d64242 72% 100%);
      }
    </style>
  </head>
  <body>
    <main class="screen">
      <aside class="panel">
        <section class="top-panel">
          <div class="turn">↱</div>
          <div>
            <div class="distance">300 m</div>
            <div class="road">青山通りを左方向</div>
          </div>
        </section>

        <section class="eta-card">
          <div class="eta-main">18分</div>
          <div class="eta-sub">8.4 km · 12:48 到着予定</div>
          <div class="traffic"></div>
        </section>
      </aside>

      <section class="speed-stack" aria-label="速度">
        <div class="speed-card">
          <span class="speed-value">48</span>
          <span class="speed-unit">km/h</span>
        </div>
        <div class="limit-sign" aria-label="制限速度 50 km/h">50</div>
      </section>
    </main>
  </body>
</html>

<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root { --accent: #1b6ef3; --surface: #fff; --bg: #eef1f5; --text: #1a1c1e; --muted: #6b7685; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body { font-family: system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100%; }
      .nav { width: 280px; padding: 28px 20px; background: var(--surface); border-right: 1px solid #e2e6ec; }
      .nav h1 { margin: 0 0 24px; font-size: 24px; font-weight: 800; }
      .nav a { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-radius: 12px; font-size: 15px; color: var(--text); text-decoration: none; }
      .nav a.active { background: #eaf1ff; color: var(--accent); font-weight: 700; }
      .content { flex: 1; padding: 36px 48px; overflow: auto; }
      .content h2 { margin: 0 0 24px; font-size: 22px; }
      .card { background: var(--surface); border-radius: 16px; padding: 8px 24px; max-width: 720px; }
      .row { display: flex; align-items: center; gap: 16px; padding: 20px 0; border-bottom: 1px solid #eef0f3; }
      .row:last-child { border-bottom: 0; }
      .row .ico { font-size: 22px; }
      .row .label { flex: 1; font-size: 16px; }
      .row .value { color: var(--muted); }
      .toggle { width: 46px; height: 26px; border-radius: 999px; background: var(--accent); position: relative; }
      .toggle::after { content: ""; position: absolute; right: 3px; top: 3px; width: 20px; height: 20px; border-radius: 50%; background: #fff; }
    </style>
  </head>
  <body>
    <div class="nav">
      <h1>設定</h1>
      <a class="active">🧭 案内</a>
      <a>🎨 表示</a>
      <a>🔔 通知</a>
      <a>ℹ️ アプリ情報</a>
    </div>
    <div class="content">
      <h2>案内</h2>
      <div class="card">
        <div class="row"><span class="ico">🔊</span><span class="label">音声案内</span><span class="toggle"></span></div>
        <div class="row"><span class="ico">🛣️</span><span class="label">高速道路を優先</span><span class="value">オフ ›</span></div>
        <div class="row"><span class="ico">💴</span><span class="label">料金所を回避</span><span class="value">オフ ›</span></div>
        <div class="row"><span class="ico">📍</span><span class="label">案内地点の密度</span><span class="value">標準 ›</span></div>
      </div>
    </div>
  </body>
</html>

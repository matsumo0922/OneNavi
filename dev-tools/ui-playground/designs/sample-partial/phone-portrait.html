<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root { --accent: #1b6ef3; --surface: #fff; --bg: #eef1f5; --text: #1a1c1e; --muted: #6b7685; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body { font-family: system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif; background: var(--bg); color: var(--text); }
      .topbar { padding: 18px 20px; font-size: 20px; font-weight: 800; background: var(--surface); border-bottom: 1px solid #e2e6ec; }
      .group { margin: 16px; background: var(--surface); border-radius: 14px; overflow: hidden; }
      .group h2 { margin: 0; padding: 12px 18px; font-size: 12px; color: var(--muted); font-weight: 700; background: #f6f8fb; }
      .row { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-bottom: 1px solid #eef0f3; }
      .row:last-child { border-bottom: 0; }
      .row .ico { font-size: 20px; }
      .row .label { flex: 1; font-size: 15px; }
      .row .value { color: var(--muted); font-size: 13px; }
      .toggle { width: 42px; height: 24px; border-radius: 999px; background: var(--accent); position: relative; }
      .toggle::after { content: ""; position: absolute; right: 3px; top: 3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; }
    </style>
  </head>
  <body>
    <div class="topbar">設定</div>
    <div class="group">
      <h2>案内</h2>
      <div class="row"><span class="ico">🔊</span><span class="label">音声案内</span><span class="toggle"></span></div>
      <div class="row"><span class="ico">🛣️</span><span class="label">高速道路を優先</span><span class="value">オフ ›</span></div>
      <div class="row"><span class="ico">💴</span><span class="label">料金所を回避</span><span class="value">オフ ›</span></div>
    </div>
    <div class="group">
      <h2>表示</h2>
      <div class="row"><span class="ico">🌙</span><span class="label">ダークモード</span><span class="value">自動 ›</span></div>
      <div class="row"><span class="ico">🧭</span><span class="label">地図の向き</span><span class="value">進行方向 ›</span></div>
    </div>
  </body>
</html>

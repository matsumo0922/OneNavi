<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --maneuver: #1e8e3e;
        --control: rgba(32, 33, 36, 0.86);
        --eta-green: #1e8e3e;
        --text: #202124;
        --muted: #5f6368;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif;
        color: var(--text);
        position: relative;
        overflow: hidden;
        width: 1280px;
        height: 800px;
        background: #e8eae5;
      }
      #map { position: absolute; inset: 0; display: block; }

      /* マニューバ（緑バナー） */
      .maneuver {
        position: absolute;
        top: 20px;
        right: 92px;
        min-width: 380px;
        display: flex;
        align-items: center;
        gap: 22px;
        background: var(--maneuver);
        color: #fff;
        border-radius: 16px;
        padding: 18px 28px 18px 20px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.28);
      }
      .maneuver .turn { width: 52px; height: 52px; flex: 0 0 auto; }
      .maneuver .turn svg { width: 52px; height: 52px; }
      .maneuver .dist { font-size: 34px; font-weight: 700; line-height: 1; }
      .maneuver .dist span { font-size: 22px; font-weight: 600; margin-left: 5px; }
      .maneuver .street { font-size: 22px; font-weight: 500; margin-top: 7px; }

      /* 右端 操作レール */
      .rail { position: absolute; top: 20px; right: 16px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
      .ctl {
        width: 60px; height: 60px; border-radius: 50%;
        background: var(--control);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
      }
      .ctl svg { width: 30px; height: 30px; }
      .ctl.recenter { background: #ea4335; }
      .ctl.warn { background: #f9ab00; }

      /* 右下 ズーム */
      .zoom { position: absolute; right: 16px; bottom: 28px; display: flex; flex-direction: column; gap: 12px; }

      /* 左下 ブランド */
      .gmark {
        position: absolute; left: 22px; bottom: 22px;
        font-size: 28px; font-weight: 500; letter-spacing: -0.5px;
        text-shadow: 0 1px 4px rgba(255, 255, 255, 0.95);
      }
      .gmark .g-b { color: #4285f4; } .gmark .g-r { color: #ea4335; }
      .gmark .g-y { color: #fbbc04; } .gmark .g-g { color: #34a853; }

      /* 下部右 ETA カード */
      .eta-card {
        position: absolute; right: 96px; bottom: 28px;
        width: 420px;
        background: #fff; border-radius: 22px;
        padding: 16px 22px 14px;
        box-shadow: 0 8px 26px rgba(0, 0, 0, 0.24);
      }
      .eta-top { display: flex; align-items: center; gap: 8px; }
      .eta-top .min { font-size: 32px; font-weight: 700; color: var(--eta-green); line-height: 1; }
      .eta-top .min span { font-size: 20px; }
      .eta-top svg { width: 22px; height: 22px; }
      .eta-sub { font-size: 18px; color: var(--muted); margin-top: 6px; }
      .eta-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
      .act { width: 56px; height: 56px; border-radius: 50%; background: #f1f3f4; display: flex; align-items: center; justify-content: center; }
      .act svg { width: 28px; height: 28px; }
    </style>
  </head>
  <body>
    <canvas id="map"></canvas>

    <!-- マニューバ -->
    <div class="maneuver">
      <div class="turn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21 L12 5" /><path d="M5.5 11.5 L12 4 L18.5 11.5" />
        </svg>
      </div>
      <div>
        <div class="dist">800<span>m</span></div>
        <div class="street">後飯町</div>
      </div>
    </div>

    <!-- 右端 操作レール -->
    <div class="rail">
      <div class="ctl" aria-label="設定">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M19.14 12.94a8 8 0 0 0 .05-1.88l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58a8 8 0 0 0 0 1.88l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.13.22.39.31.6.22l2.39-.96c.49.38 1.03.7 1.62.94l.36 2.54c.04.24.25.42.5.42h3.84c.25 0 .46-.18.5-.42l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.21.09.47 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/></svg>
      </div>
      <div class="ctl" aria-label="音量">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06a9 9 0 0 0 0-17.54z"/></svg>
      </div>
      <div class="ctl recenter" aria-label="再センタリング">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2 L4.6 20.4a.6.6 0 0 0 .82.78L12 18.2l6.58 2.98a.6.6 0 0 0 .82-.78z"/></svg>
      </div>
      <div class="ctl warn" aria-label="注意情報">
        <svg viewBox="0 0 24 24" fill="none" stroke-linejoin="round">
          <path d="M12 4 L21 19.5 H3 z" fill="#1a1a1a" />
          <path d="M12 10 v4.4" stroke="#f9ab00" stroke-width="2.4" stroke-linecap="round" /><circle cx="12" cy="17.4" r="1.2" fill="#f9ab00" />
        </svg>
      </div>
    </div>

    <!-- 右下 ズーム -->
    <div class="zoom">
      <div class="ctl" aria-label="ズームイン"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M12 6v12 M6 12h12"/></svg></div>
      <div class="ctl" aria-label="ズームアウト"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M6 12h12"/></svg></div>
    </div>

    <!-- 左下 ブランド -->
    <div class="gmark"><span class="g-b">G</span><span class="g-r">o</span><span class="g-y">o</span><span class="g-b">g</span><span class="g-g">l</span><span class="g-r">e</span></div>

    <!-- 下部右 ETA カード -->
    <div class="eta-card">
      <div class="eta-top">
        <div class="min">6<span>分</span></div>
        <svg viewBox="0 0 24 24" fill="#1e8e3e"><path d="M17 8c-9 2-11 8.2-13 14l1.9-.5C7 16 9 13 17 11c-3 4-7 5-9 7 .5.3 1 .5 1.6.7 3.5 1.3 7.4-.5 8.9-4 1.5-3.6 1-8 .5-11-1 .9-2 1.6-2 4z"/></svg>
      </div>
      <div class="eta-sub">3.4 km · 0:25 着</div>
      <div class="eta-actions">
        <div class="act" aria-label="案内終了"><svg viewBox="0 0 24 24" fill="none" stroke="#3c4043" stroke-width="2.2" stroke-linecap="round"><path d="M6 6 L18 18 M18 6 L6 18"/></svg></div>
        <div class="act" aria-label="他のルート"><svg viewBox="0 0 24 24" fill="none" stroke="#3c4043" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20V9a3 3 0 0 1 3-3h4"/><path d="M11 3l3.5 3L11 9"/><path d="M17 4v11a3 3 0 0 1-3 3h-4"/><path d="M13 21l-3.5-3L13 15"/></svg></div>
        <div class="act" aria-label="経由地を追加"><svg viewBox="0 0 24 24" fill="none" stroke="#3c4043" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8 M8 12h8" stroke-linecap="round"/></svg></div>
        <div class="act" aria-label="ルートを編集"><svg viewBox="0 0 24 24" fill="none" stroke="#3c4043" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.4"/><path d="M6 8.4v3a4 4 0 0 0 4 4h5"/><path d="M16 11l4 4-4 4" /></svg></div>
        <div class="act" aria-label="その他"><svg viewBox="0 0 24 24" fill="#3c4043"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg></div>
      </div>
    </div>

    <script>
      (function () {
        const canvas = document.getElementById("map");
        const DESIGN_W = 1280;
        const DESIGN_H = 800;
        const cssW = window.innerWidth || DESIGN_W;
        const cssH = window.innerHeight || DESIGN_H;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.round(cssW * dpr);
        canvas.height = Math.round(cssH * dpr);
        canvas.style.width = cssW + "px";
        canvas.style.height = cssH + "px";
        const ctx = canvas.getContext("2d");
        // デザイン空間(1280x800)で描けるよう、表示サイズへスケールする変換を設定。
        ctx.setTransform((dpr * cssW) / DESIGN_W, 0, 0, (dpr * cssH) / DESIGN_H, 0, 0);

        // 固定 seed の擬似乱数（毎回同じ地図にする）。
        let seed = 7654321;
        const rnd = () => {
          seed = (seed * 1664525 + 1013904223) >>> 0;
          return seed / 4294967296;
        };

        const W = DESIGN_W;
        const H = DESIGN_H;

        // --- 地: ベース ---
        ctx.fillStyle = "#e9eae4";
        ctx.fillRect(0, 0, W, H);

        // --- 公園(緑地) ---
        const parks = [
          [120, 150, 150, 120], [1080, 170, 130, 110],
          [760, 250, 90, 70], [980, 600, 200, 150], [430, 700, 120, 90],
        ];
        ctx.fillStyle = "#cfe8cf";
        for (const [px, py, prx, pry] of parks) {
          ctx.beginPath();
          ctx.ellipse(px, py, prx, pry, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        const inPark = (x, y) => parks.some(([px, py, prx, pry]) => ((x - px) / prx) ** 2 + ((y - py) / pry) ** 2 < 1);

        // --- 建物(灰色ブロックを密に敷く。3D風に右下へ陰) ---
        const shades = ["#dad9d3", "#d3d2cb", "#deddd7", "#d7d4cb", "#cecdc6"];
        const step = 21;
        for (let gx = -10; gx < W + 20; gx += step) {
          for (let gy = -10; gy < H + 20; gy += step) {
            if (rnd() > 0.6) continue;
            const bx = gx + rnd() * 4;
            const by = gy + rnd() * 4;
            if (inPark(bx, by)) continue;
            const bw = 9 + rnd() * 11;
            const bh = 9 + rnd() * 11;
            ctx.fillStyle = "#c6c5bd";
            ctx.fillRect(bx + 1.5, by + 1.5, bw, bh);
            ctx.fillStyle = shades[(rnd() * shades.length) | 0];
            ctx.fillRect(bx, by, bw, bh);
          }
        }

        // --- 水域(川) ---
        ctx.strokeStyle = "#a9d3f0";
        ctx.lineWidth = 30;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(-20, 640);
        ctx.bezierCurveTo(220, 560, 360, 700, 620, 650);
        ctx.bezierCurveTo(860, 600, 1000, 700, 1300, 620);
        ctx.stroke();

        // --- 道路網 ---
        const drawRoads = (lines, width, color) => {
          ctx.strokeStyle = color;
          ctx.lineWidth = width;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          for (const pts of lines) {
            ctx.beginPath();
            ctx.moveTo(pts[0][0], pts[0][1]);
            for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
            ctx.stroke();
          }
        };
        // 細街路グリッド(白・細)
        const minor = [];
        for (let i = -1; i < 16; i++) {
          const x = i * 92 + 30;
          minor.push([[x + 24, -20], [x, H + 20]]);
        }
        for (let i = -1; i < 11; i++) {
          const y = i * 90 + 40;
          minor.push([[-20, y], [W + 20, y - 24]]);
        }
        drawRoads(minor, 9, "#f4f4ef");
        // 主要道路(白・太)
        drawRoads([
          [[-20, 250], [300, 230], [620, 250], [940, 230], [1300, 250]],
          [[-20, 560], [340, 520], [700, 560], [1000, 530], [1300, 560]],
          [[680, -20], [720, 280], [820, 520], [900, 820]],
        ], 18, "#ffffff");
        // 鉄道(細い灰)
        ctx.strokeStyle = "#b6b6b0";
        ctx.lineWidth = 3;
        ctx.setLineDash([8, 6]);
        ctx.beginPath();
        ctx.moveTo(320, 220);
        ctx.lineTo(760, 560);
        ctx.lineTo(900, 820);
        ctx.stroke();
        ctx.setLineDash([]);

        // --- ルート(太い紺・3D風) ---
        const route = [
          [432, 760], [436, 690], [444, 600], [450, 510], [446, 430],
          [434, 360], [418, 300], [398, 240], [368, 188], [322, 140],
          [282, 104], [256, 78],
        ];
        const tracePath = () => {
          ctx.beginPath();
          ctx.moveTo(route[0][0], route[0][1]);
          for (let i = 1; i < route.length - 1; i++) {
            const mx = (route[i][0] + route[i + 1][0]) / 2;
            const my = (route[i][1] + route[i + 1][1]) / 2;
            ctx.quadraticCurveTo(route[i][0], route[i][1], mx, my);
          }
          const last = route[route.length - 1];
          ctx.lineTo(last[0], last[1]);
        };
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 28; tracePath(); ctx.stroke();   // ケーシング
        ctx.strokeStyle = "#143ca8"; ctx.lineWidth = 18; tracePath(); ctx.stroke();   // 本体(紺)
        ctx.strokeStyle = "#3f6bdc"; ctx.lineWidth = 7; tracePath(); ctx.stroke();    // ハイライト

        // --- 信号アイコン(ルート上に3つ) ---
        const signals = [[449, 470], [443, 388], [428, 322]];
        for (const [sx, sy] of signals) {
          ctx.fillStyle = "#37383c";
          ctx.beginPath();
          ctx.roundRect(sx - 15, sy - 8, 30, 16, 8);
          ctx.fill();
          ctx.fillStyle = "#ea4335"; ctx.beginPath(); ctx.arc(sx - 6, sy, 4, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = "#34d058"; ctx.beginPath(); ctx.arc(sx + 6, sy, 4, 0, Math.PI * 2); ctx.fill();
        }

        // --- 駐車場アイコン(P) ---
        const drawParking = (px, py) => {
          ctx.fillStyle = "#7d6cd6";
          ctx.beginPath(); ctx.roundRect(px - 13, py - 13, 26, 26, 7); ctx.fill();
          ctx.fillStyle = "#fff";
          ctx.font = "bold 18px system-ui";
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText("P", px, py + 1);
        };
        drawParking(150, 462);
        drawParking(404, 660);

        // --- 地名ラベル ---
        ctx.fillStyle = "#5f6368";
        ctx.font = "14px system-ui";
        ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
        const labels = [
          ["清水町", 232, 246], ["後飯町", 264, 320], ["飯沼町", 176, 463],
          ["愛宕町", 452, 232], ["前宿町", 668, 342], ["陣屋町", 576, 520],
          ["東小川町", 928, 396], ["高神原町", 1150, 248], ["2丁目", 470, 706],
        ];
        for (const [text, lx, ly] of labels) ctx.fillText(text, lx, ly);

        // --- 国道シールド(244 / 254) ---
        const drawRouteShield = (rx, ry, num) => {
          ctx.fillStyle = "#3f72c4";
          ctx.beginPath(); ctx.roundRect(rx - 18, ry - 11, 36, 22, 5); ctx.fill();
          ctx.fillStyle = "#fff";
          ctx.font = "bold 14px system-ui";
          ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText(num, rx, ry + 1);
        };
        drawRouteShield(404, 256, "244");
        drawRouteShield(266, 466, "254");

        // --- 「同様の所要時間」代替ルート吹き出し ---
        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.beginPath(); ctx.roundRect(140, 478, 178, 34, 17); ctx.fill();
        ctx.fillStyle = "#3c4043";
        ctx.font = "15px system-ui";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("同様の所要時間", 229, 496);

        // --- ターン青吹き出し(右折プレビュー) ---
        const bx = 142, by = 188;
        ctx.fillStyle = "#1a56e8";
        ctx.beginPath(); ctx.roundRect(bx - 34, by - 24, 68, 48, 13); ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 3.4; ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(bx - 9, by + 12); ctx.lineTo(bx - 9, by - 2);
        ctx.quadraticCurveTo(bx - 9, by - 11, bx, by - 11); ctx.lineTo(bx + 9, by - 11);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(bx + 3, by - 17); ctx.lineTo(bx + 11, by - 11); ctx.lineTo(bx + 3, by - 5);
        ctx.stroke();

        // --- ゴール旗ピン(左上) ---
        const gx2 = 78, gy2 = 92;
        ctx.fillStyle = "#ea4335";
        ctx.beginPath();
        ctx.moveTo(gx2, gy2 + 14);
        ctx.bezierCurveTo(gx2 - 13, gy2 - 4, gx2 - 10, gy2 - 18, gx2, gy2 - 18);
        ctx.bezierCurveTo(gx2 + 10, gy2 - 18, gx2 + 13, gy2 - 4, gx2, gy2 + 14);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.beginPath(); ctx.arc(gx2, gy2 - 6, 4.5, 0, Math.PI * 2); ctx.fill();

        // --- 県道244号 シールド(自車手前) ---
        ctx.fillStyle = "#3f72c4";
        ctx.beginPath(); ctx.roundRect(432 - 42, 742, 84, 26, 6); ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.font = "bold 15px system-ui";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("県道244号", 432, 756);

        // --- 自車位置(青チェブロン) ---
        const cx = 432, cy = 715;
        ctx.fillStyle = "rgba(26,92,232,0.16)";
        ctx.beginPath(); ctx.arc(cx, cy, 30, 0, Math.PI * 2); ctx.fill();
        ctx.save();
        ctx.translate(cx, cy);
        ctx.fillStyle = "#1a56e8";
        ctx.strokeStyle = "#ffffff";
        ctx.lineWidth = 3;
        ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(0, -22); ctx.lineTo(15, 16); ctx.lineTo(0, 7); ctx.lineTo(-15, 16); ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.restore();
      })();
    </script>
  </body>
</html>

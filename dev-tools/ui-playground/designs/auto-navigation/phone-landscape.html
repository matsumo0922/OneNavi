<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --maneuver: #1e8e3e;
        --control: rgba(32, 33, 36, 0.86);
        --eta-green: #1e8e3e;
        --text: #202124;
        --muted: #5f6368;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: system-ui, "Hiragino Sans", "Noto Sans JP", sans-serif;
        color: var(--text);
        position: relative;
        overflow: hidden;
        width: 915px;
        height: 412px;
        background: #e8eae5;
      }
      #map { position: absolute; inset: 0; display: block; }

      /* マニューバ（緑バナー） */
      .maneuver {
        position: absolute;
        top: 12px;
        right: 70px;
        min-width: 230px;
        display: flex;
        align-items: center;
        gap: 14px;
        background: var(--maneuver);
        color: #fff;
        border-radius: 13px;
        padding: 11px 18px 11px 13px;
        box-shadow: 0 5px 14px rgba(0, 0, 0, 0.28);
      }
      .maneuver .turn { width: 36px; height: 36px; flex: 0 0 auto; }
      .maneuver .turn svg { width: 36px; height: 36px; }
      .maneuver .dist { font-size: 25px; font-weight: 700; line-height: 1; }
      .maneuver .dist span { font-size: 16px; font-weight: 600; margin-left: 3px; }
      .maneuver .street { font-size: 16px; font-weight: 500; margin-top: 5px; }

      /* 右端 操作レール */
      .rail { position: absolute; top: 12px; right: 12px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
      .ctl {
        width: 46px; height: 46px; border-radius: 50%;
        background: var(--control);
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }
      .ctl svg { width: 23px; height: 23px; }
      .ctl.recenter { background: #ea4335; }
      .ctl.warn { background: #f9ab00; }

      /* 右下 ズーム */
      .zoom { position: absolute; right: 12px; bottom: 12px; display: flex; flex-direction: column; gap: 9px; }

      /* 左下 ブランド */
      .gmark {
        position: absolute; left: 16px; bottom: 12px;
        font-size: 21px; font-weight: 500; letter-spacing: -0.5px;
        text-shadow: 0 1px 4px rgba(255, 255, 255, 0.95);
      }
      .gmark .g-b { color: #4285f4; } .gmark .g-r { color: #ea4335; }
      .gmark .g-y { color: #fbbc04; } .gmark .g-g { color: #34a853; }

      /* 下部右 ETA カード */
      .eta-card {
        position: absolute; right: 68px; bottom: 14px;
        width: 286px;
        background: #fff; border-radius: 16px;
        padding: 9px 15px 8px;
        box-shadow: 0 7px 22px rgba(0, 0, 0, 0.24);
      }
      .eta-top { display: flex; align-items: center; gap: 6px; }
      .eta-top .min { font-size: 20px; font-weight: 700; color: var(--eta-green); line-height: 1; }
      .eta-top .min span { font-size: 14px; }
      .eta-top svg { width: 16px; height: 16px; }
      .eta-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
      .eta-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 7px; }
      .act { width: 34px; height: 34px; border-radius: 50%; background: #f1f3f4; display: flex; align-items: center; justify-content: center; }
      .act svg { width: 19px; height: 19px; }
    </style>
  </head>
  <body>
    <canvas id="map"></canvas>

    <!-- マニューバ -->
    <div class="maneuver">
      <div class="turn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21 L12 5" /><path d="M5.5 11.5 L12 4 L18.5 11.5" />
        </svg>
      </div>
      <div>
        <div class="dist">800<span>m</span></div>
        <div class="street">後飯町</div>
      </div>
    </div>

    <!-- 右端 操作レール -->
    <div class="rail">
      <div class="ctl" aria-label="設定">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M19.14 12.94a8 8 0 0 0 .05-1.88l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7 7 0 0 0-1.62-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58a8 8 0 0 0 0 1.88l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32c.13.22.39.31.6.22l2.39-.96c.49.38 1.03.7 1.62.94l.36 2.54c.04.24.25.42.5.42h3.84c.25 0 .46-.18.5-.42l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.21.09.47 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"/></svg>
      </div>
      <div class="ctl" aria-label="音量">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M3 10v4h4l5 5V5L7 10H3zm13.5 2A4.5 4.5 0 0 0 14 7.97v8.05A4.5 4.5 0 0 0 16.5 12zM14 3.23v2.06a7 7 0 0 1 0 13.42v2.06a9 9 0 0 0 0-17.54z"/></svg>
      </div>
      <div class="ctl recenter" aria-label="再センタリング">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2 L4.6 20.4a.6.6 0 0 0 .82.78L12 18.2l6.58 2.98a.6.6 0 0 0 .82-.78z"/></svg>
      </div>
      <div class="ctl warn" aria-label="注意情報">
        <svg viewBox="0 0 24 24" fill="none" stroke-linejoin="round">
          <path d="M12 4 L21 19.5 H3 z" fill="#1a1a1a" />
          <path d="M12 10 v4.4" stroke="#f9ab00" stroke-width="2.4" stroke-linecap="round" /><circle cx="12" cy="17.4" r="1.2" fill="#f9ab00" />
        </svg>
      </div>
    </div>

    <!-- 右下 ズーム -->
    <div class="zoom">
      <div class="ctl" aria-label="ズームイン"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M12 6v12 M6 12h12"/></svg></div>
      <div class="ctl" aria-label="ズームアウト"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M6 12h12"/></svg></div>
    </div>

    <!-- 左下 ブランド -->
    <div class="gmark"><span class="g-b">G</span><span class="g-r">o</span><span class="g-y">o</span><span class="g-b">g</span><span class="g-g">l</span><span class="g-r">e</span></div>

    <!-- 下部右 ETA カード -->
    <div class="eta-card">
      <div class="eta-top">
        <div class="min">6<span>分</span></div>
        <svg viewBox="0 0 24 24" fill="#1e8e3e"><path d="M17 8c-9 2-11 8.2-13 14l1.9-.5C7 16 9 13 17 11c-3 4-7 5-9 7 .5.3 1 .5 1.6.7 3.5 1.3 7.4-.5 8.9-4 1.5-3.6 1-8 .5-11-1 .9-2 1.6-2 4z"/></svg>
      </div>
      <div class="eta-sub">3.4 km · 0:25 着</div>
      <div class="eta-actions">
        <div class="act" aria-label="案内終了"><svg viewBox="0 0 24 24" fill="none" stroke="#3c4043" stroke-width="2.2" stroke-linecap="round"><path d="M6 6 L18 18 M18 6 L6 18"/></svg></div>
        <div class="act" aria-label="他のルート"><svg viewBox="0 0 24 24" fill="none" stroke="#3c4043" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 20V9a3 3 0 0 1 3-3h4"/><path d="M11 3l3.5 3L11 9"/><path d="M17 4v11a3 3 0 0 1-3 3h-4"/><path d="M13 21l-3.5-3L13 15"/></svg></div>
        <div class="act" aria-label="経由地を追加"><svg viewBox="0 0 24 24" fill="none" stroke="#3c4043" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v8 M8 12h8" stroke-linecap="round"/></svg></div>
        <div class="act" aria-label="ルートを編集"><svg viewBox="0 0 24 24" fill="none" stroke="#3c4043" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="2.4"/><path d="M6 8.4v3a4 4 0 0 0 4 4h5"/><path d="M16 11l4 4-4 4" /></svg></div>
        <div class="act" aria-label="その他"><svg viewBox="0 0 24 24" fill="#3c4043"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg></div>
      </div>
    </div>

    <script>
      (function () {
        const canvas = document.getElementById("map");
        const DESIGN_W = 915;
        const DESIGN_H = 412;
        const cssW = window.innerWidth || DESIGN_W;
        const cssH = window.innerHeight || DESIGN_H;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.round(cssW * dpr);
        canvas.height = Math.round(cssH * dpr);
        canvas.style.width = cssW + "px";
        canvas.style.height = cssH + "px";
        const ctx = canvas.getContext("2d");
        ctx.setTransform((dpr * cssW) / DESIGN_W, 0, 0, (dpr * cssH) / DESIGN_H, 0, 0);

        let seed = 7654321;
        const rnd = () => { seed = (seed * 1664525 + 1013904223) >>> 0; return seed / 4294967296; };

        const W = DESIGN_W;
        const H = DESIGN_H;

        ctx.fillStyle = "#e9eae4";
        ctx.fillRect(0, 0, W, H);

        const parks = [
          [90, 70, 110, 70], [780, 80, 95, 65], [560, 130, 70, 45],
          [700, 330, 150, 90], [320, 380, 90, 55],
        ];
        ctx.fillStyle = "#cfe8cf";
        for (const [px, py, prx, pry] of parks) {
          ctx.beginPath(); ctx.ellipse(px, py, prx, pry, 0, 0, Math.PI * 2); ctx.fill();
        }
        const inPark = (x, y) => parks.some(([px, py, prx, pry]) => ((x - px) / prx) ** 2 + ((y - py) / pry) ** 2 < 1);

        const shades = ["#dad9d3", "#d3d2cb", "#deddd7", "#d7d4cb", "#cecdc6"];
        const step = 16;
        for (let gx = -10; gx < W + 20; gx += step) {
          for (let gy = -10; gy < H + 20; gy += step) {
            if (rnd() > 0.6) continue;
            const bx = gx + rnd() * 3;
            const by = gy + rnd() * 3;
            if (inPark(bx, by)) continue;
            const bw = 7 + rnd() * 8;
            const bh = 7 + rnd() * 8;
            ctx.fillStyle = "#c6c5bd"; ctx.fillRect(bx + 1.2, by + 1.2, bw, bh);
            ctx.fillStyle = shades[(rnd() * shades.length) | 0]; ctx.fillRect(bx, by, bw, bh);
          }
        }

        ctx.strokeStyle = "#a9d3f0"; ctx.lineWidth = 24; ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(-20, 330);
        ctx.bezierCurveTo(160, 280, 260, 360, 440, 330);
        ctx.bezierCurveTo(620, 300, 720, 360, 940, 320);
        ctx.stroke();

        const drawRoads = (lines, width, color) => {
          ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap = "round"; ctx.lineJoin = "round";
          for (const pts of lines) {
            ctx.beginPath(); ctx.moveTo(pts[0][0], pts[0][1]);
            for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
            ctx.stroke();
          }
        };
        const minor = [];
        for (let i = -1; i < 16; i++) { const x = i * 66 + 20; minor.push([[x + 18, -20], [x, H + 20]]); }
        for (let i = -1; i < 8; i++) { const y = i * 64 + 28; minor.push([[-20, y], [W + 20, y - 18]]); }
        drawRoads(minor, 7, "#f4f4ef");
        drawRoads([
          [[-20, 140], [220, 124], [450, 140], [680, 122], [940, 140]],
          [[-20, 300], [240, 276], [500, 300], [720, 280], [940, 300]],
          [[480, -20], [510, 150], [600, 300], [660, 430]],
        ], 14, "#ffffff");
        ctx.strokeStyle = "#b6b6b0"; ctx.lineWidth = 2.5; ctx.setLineDash([7, 5]);
        ctx.beginPath(); ctx.moveTo(230, 120); ctx.lineTo(560, 320); ctx.lineTo(660, 430); ctx.stroke();
        ctx.setLineDash([]);

        const route = [
          [430, 400], [434, 352], [440, 300], [444, 252], [440, 208],
          [430, 170], [416, 132], [392, 96], [352, 62], [310, 40], [282, 26],
        ];
        const tracePath = () => {
          ctx.beginPath(); ctx.moveTo(route[0][0], route[0][1]);
          for (let i = 1; i < route.length - 1; i++) {
            const mx = (route[i][0] + route[i + 1][0]) / 2;
            const my = (route[i][1] + route[i + 1][1]) / 2;
            ctx.quadraticCurveTo(route[i][0], route[i][1], mx, my);
          }
          const last = route[route.length - 1]; ctx.lineTo(last[0], last[1]);
        };
        ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 22; tracePath(); ctx.stroke();
        ctx.strokeStyle = "#143ca8"; ctx.lineWidth = 14; tracePath(); ctx.stroke();
        ctx.strokeStyle = "#3f6bdc"; ctx.lineWidth = 5.5; tracePath(); ctx.stroke();

        const signals = [[442, 252], [436, 200], [424, 160]];
        for (const [sx, sy] of signals) {
          ctx.fillStyle = "#37383c"; ctx.beginPath(); ctx.roundRect(sx - 12, sy - 6.5, 24, 13, 6.5); ctx.fill();
          ctx.fillStyle = "#ea4335"; ctx.beginPath(); ctx.arc(sx - 5, sy, 3.2, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = "#34d058"; ctx.beginPath(); ctx.arc(sx + 5, sy, 3.2, 0, Math.PI * 2); ctx.fill();
        }

        const drawParking = (px, py) => {
          ctx.fillStyle = "#7d6cd6"; ctx.beginPath(); ctx.roundRect(px - 11, py - 11, 22, 22, 6); ctx.fill();
          ctx.fillStyle = "#fff"; ctx.font = "bold 15px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText("P", px, py + 1);
        };
        drawParking(140, 250);
        drawParking(396, 332);

        ctx.fillStyle = "#5f6368"; ctx.font = "11px system-ui"; ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
        const labels = [
          ["清水町", 210, 130], ["後飯町", 250, 172], ["飯沼町", 160, 250],
          ["前宿町", 600, 184], ["陣屋町", 520, 300], ["東小川町", 770, 210], ["2丁目", 432, 380],
        ];
        for (const [text, lx, ly] of labels) ctx.fillText(text, lx, ly);

        const drawRouteShield = (rx, ry, num) => {
          ctx.fillStyle = "#3f72c4"; ctx.beginPath(); ctx.roundRect(rx - 15, ry - 9, 30, 18, 4); ctx.fill();
          ctx.fillStyle = "#fff"; ctx.font = "bold 11px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText(num, rx, ry + 1);
        };
        drawRouteShield(396, 138, "244");
        drawRouteShield(238, 252, "254");

        ctx.fillStyle = "rgba(255,255,255,0.92)"; ctx.beginPath(); ctx.roundRect(120, 256, 140, 28, 14); ctx.fill();
        ctx.fillStyle = "#3c4043"; ctx.font = "12px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("同様の所要時間", 190, 271);

        const bx = 120, by = 100;
        ctx.fillStyle = "#1a56e8"; ctx.beginPath(); ctx.roundRect(bx - 28, by - 20, 56, 40, 11); ctx.fill();
        ctx.strokeStyle = "#fff"; ctx.lineWidth = 3; ctx.lineCap = "round"; ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(bx - 8, by + 10); ctx.lineTo(bx - 8, by - 2);
        ctx.quadraticCurveTo(bx - 8, by - 9, bx, by - 9); ctx.lineTo(bx + 7, by - 9);
        ctx.stroke();
        ctx.beginPath(); ctx.moveTo(bx + 2, by - 14); ctx.lineTo(bx + 9, by - 9); ctx.lineTo(bx + 2, by - 4); ctx.stroke();

        const gx2 = 64, gy2 = 50;
        ctx.fillStyle = "#ea4335";
        ctx.beginPath();
        ctx.moveTo(gx2, gy2 + 12);
        ctx.bezierCurveTo(gx2 - 11, gy2 - 4, gx2 - 8, gy2 - 16, gx2, gy2 - 16);
        ctx.bezierCurveTo(gx2 + 8, gy2 - 16, gx2 + 11, gy2 - 4, gx2, gy2 + 12);
        ctx.fill();
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(gx2, gy2 - 5, 3.8, 0, Math.PI * 2); ctx.fill();

        ctx.fillStyle = "#3f72c4"; ctx.beginPath(); ctx.roundRect(430 - 36, 404, 72, 22, 5); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.font = "bold 12px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("県道244号", 430, 415);

        const cx = 430, cy = 396;
        ctx.fillStyle = "rgba(26,92,232,0.16)"; ctx.beginPath(); ctx.arc(cx, cy, 24, 0, Math.PI * 2); ctx.fill();
        ctx.save();
        ctx.translate(cx, cy);
        ctx.fillStyle = "#1a56e8"; ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2.6; ctx.lineJoin = "round";
        ctx.beginPath();
        ctx.moveTo(0, -18); ctx.lineTo(12, 13); ctx.lineTo(0, 6); ctx.lineTo(-12, 13); ctx.closePath();
        ctx.fill(); ctx.stroke();
        ctx.restore();
      })();
    </script>
  </body>
</html>

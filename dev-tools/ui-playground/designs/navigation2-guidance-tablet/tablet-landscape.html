<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <style>
      :root {
        --route: #2f06bf;
        --route-core: #371cff;
        --route-glow: rgba(46, 24, 196, 0.28);
        --green: #00885c;
        --green-dark: #00764e;
        --surface: #ffffff;
        --surface-soft: #f4f8f7;
        --text: #17201d;
        --muted: #5f6b66;
        --road: #c8d4dc;
        --road-strong: #9caab5;
        --water: #aeeaf4;
        --park: #c6f5cc;
        --building: #e4ded8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
        background: #dfe7ea;
      }

      button {
        padding: 0;
        color: inherit;
        font: inherit;
        background: transparent;
        border: 0;
        cursor: default;
      }

      .screen {
        position: relative;
        width: 1280px;
        height: 800px;
        overflow: hidden;
        background: #edf2f3;
      }

      .map {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background:
          radial-gradient(circle at 70% 18%, rgba(198, 245, 204, 0.88) 0 10%, transparent 28%),
          linear-gradient(180deg, #f5f8f8 0%, #ecf1f2 48%, #e6edf0 100%);
      }

      .map::after {
        position: absolute;
        inset: 0;
        content: "";
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.34) 50%, rgba(255, 255, 255, 0.06)),
          radial-gradient(circle at 42% 56%, rgba(255, 255, 255, 0.58), transparent 33%),
          rgba(255, 255, 255, 0.18);
        mix-blend-mode: screen;
      }

      .map-svg {
        position: absolute;
        inset: -18px -16px 0 -14px;
        width: 1320px;
        height: 840px;
      }

      .park {
        fill: var(--park);
        opacity: 0.9;
      }

      .water {
        fill: none;
        stroke: var(--water);
        stroke-width: 18;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.72;
      }

      .water-fill {
        fill: var(--water);
        opacity: 0.62;
      }

      .block {
        fill: var(--building);
        opacity: 0.64;
      }

      .road-minor {
        fill: none;
        stroke: var(--road);
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.74;
      }

      .road-mid {
        fill: none;
        stroke: #b5c3cd;
        stroke-width: 8;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.88;
      }

      .road-main {
        fill: none;
        stroke: #f7fafb;
        stroke-width: 18;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .road-main-line {
        fill: none;
        stroke: #94a4b0;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.9;
      }

      .label {
        fill: #61716f;
        font-size: 17px;
        font-weight: 700;
        opacity: 0.72;
      }

      .small-label {
        fill: #657271;
        font-size: 13px;
        font-weight: 700;
        opacity: 0.68;
      }

      .shield {
        fill: #2f8bd6;
        filter: url("#softShadow");
      }

      .shield-text {
        fill: #ffffff;
        font-size: 10px;
        font-weight: 800;
      }

      .route-under {
        fill: none;
        stroke: #141273;
        stroke-width: 19;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 2px 2px var(--route-glow));
      }

      .route-core {
        fill: none;
        stroke: var(--route);
        stroke-width: 13;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .route-highlight {
        fill: none;
        stroke: var(--route-core);
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.82;
      }

      .alt-route {
        fill: none;
        stroke: #334eff;
        stroke-width: 7;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.72;
      }

      .alt-route-inner {
        fill: none;
        stroke: #dbe2ff;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.85;
      }

      .maneuver-badge {
        position: absolute;
        top: 112px;
        left: 86px;
        display: grid;
        place-items: center;
        width: 62px;
        height: 36px;
        color: #ffffff;
        background: #123ee8;
        border-radius: 18px 18px 18px 4px;
        box-shadow: 0 2px 10px rgba(15, 45, 160, 0.35);
      }

      .time-callout {
        position: absolute;
        left: 76px;
        top: 460px;
        display: flex;
        align-items: center;
        height: 44px;
        padding: 0 15px;
        color: #7a8584;
        font-size: 21px;
        font-weight: 800;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(199, 205, 208, 0.78);
        border-radius: 6px;
        box-shadow: 0 2px 6px rgba(80, 94, 102, 0.12);
      }

      .turn-banner {
        position: absolute;
        top: 28px;
        right: 110px;
        display: grid;
        grid-template-columns: 72px 1fr;
        align-items: center;
        width: 420px;
        height: 96px;
        color: #ffffff;
        background: var(--green);
        border-radius: 10px;
        box-shadow: 0 2px 12px rgba(0, 76, 52, 0.28);
      }

      .turn-icon {
        display: grid;
        place-items: center;
        width: 72px;
        height: 96px;
      }

      .turn-main {
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-width: 0;
      }

      .turn-distance {
        font-size: 28px;
        font-weight: 500;
        line-height: 1;
      }

      .turn-place {
        margin-top: 8px;
        font-size: 28px;
        font-weight: 800;
        line-height: 1.05;
      }

      .control-column {
        position: absolute;
        top: 28px;
        right: 28px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        z-index: 5;
      }

      .circle-button {
        display: grid;
        place-items: center;
        width: 58px;
        height: 58px;
        color: #1f2523;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(205, 211, 214, 0.72);
        border-radius: 999px;
        box-shadow: 0 2px 8px rgba(35, 47, 52, 0.12);
      }

      .circle-button.warn {
        color: #d18a00;
      }

      .circle-button.compass {
        color: #e91b2d;
      }

      .zoom-control {
        position: absolute;
        right: 28px;
        bottom: 36px;
        display: grid;
        grid-template-rows: 60px 1px 60px;
        width: 58px;
        height: 121px;
        overflow: hidden;
        color: #26302d;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(205, 211, 214, 0.72);
        border-radius: 30px;
        box-shadow: 0 2px 10px rgba(35, 47, 52, 0.12);
      }

      .zoom-divider {
        width: 32px;
        height: 1px;
        margin: 0 auto;
        background: #d7dddf;
      }

      .zoom-button {
        display: grid;
        place-items: center;
        font-size: 38px;
        line-height: 1;
      }

      .eta-card {
        position: absolute;
        right: 110px;
        bottom: 36px;
        width: 420px;
        height: 154px;
        padding: 19px 24px 16px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(212, 218, 219, 0.78);
        border-radius: 13px;
        box-shadow: 0 2px 12px rgba(35, 47, 52, 0.13);
      }

      .eta-line {
        display: flex;
        align-items: baseline;
        gap: 9px;
      }

      .eta-minutes {
        color: #008a4e;
        font-size: 25px;
        font-weight: 850;
        line-height: 1;
      }

      .leaf {
        color: #008a4e;
      }

      .eta-distance {
        margin-top: 9px;
        color: #49514e;
        font-size: 22px;
        font-weight: 500;
        letter-spacing: 0;
      }

      .eta-actions {
        display: grid;
        grid-template-columns: 82px 1fr 1fr 1fr 1fr;
        align-items: center;
        gap: 14px;
        margin-top: 18px;
      }

      .action-button {
        display: grid;
        place-items: center;
        height: 46px;
        color: #17201d;
      }

      .action-button.close {
        width: 82px;
        background: #eaf0ef;
        border-radius: 26px;
      }

      .traffic-light {
        filter: drop-shadow(0 1px 2px rgba(21, 26, 29, 0.28));
      }

      .map-dot {
        position: absolute;
        display: grid;
        place-items: center;
        width: 33px;
        height: 33px;
        color: #ffffff;
        background: #6b72cf;
        border: 4px solid rgba(255, 255, 255, 0.88);
        border-radius: 999px;
        box-shadow: 0 1px 4px rgba(60, 68, 78, 0.25);
      }

      .map-dot.one {
        left: 87px;
        top: 424px;
      }

      .map-dot.two {
        left: 356px;
        top: 636px;
      }

      .position-arrow {
        position: absolute;
        left: 376px;
        bottom: 52px;
        width: 54px;
        height: 54px;
        filter: drop-shadow(0 2px 4px rgba(18, 34, 82, 0.28));
      }

      .road-pill {
        position: absolute;
        left: 362px;
        bottom: 20px;
        padding: 4px 11px 5px;
        color: #1b72db;
        font-size: 18px;
        font-weight: 850;
        background: rgba(255, 255, 255, 0.82);
        border-radius: 5px;
      }

      .brand {
        position: absolute;
        left: 26px;
        bottom: 22px;
        display: flex;
        gap: 1px;
        align-items: baseline;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0;
        opacity: 0.86;
      }

      .brand span:nth-child(1),
      .brand span:nth-child(4) {
        color: #4285f4;
      }

      .brand span:nth-child(2),
      .brand span:nth-child(6) {
        color: #db4437;
      }

      .brand span:nth-child(3) {
        color: #f4b400;
      }

      .brand span:nth-child(5) {
        color: #0f9d58;
      }

      svg {
        display: block;
      }
    </style>
  </head>

        <div class="maneuver-badge" aria-hidden="true">
          <svg width="30" height="28" viewBox="0 0 30 28">
            <path d="M20 24V8.5h-7.8" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M12.7 3.8 7.7 8.8l5 5" fill="none" stroke="currentColor" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <div class="time-callout">同様の所要時間</div>
        <div class="map-dot one">
          <svg width="18" height="18" viewBox="0 0 20 20">
            <rect x="5" y="4" width="8" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
            <circle cx="15" cy="10" r="3" fill="currentColor" />
          </svg>
        </div>
        <div class="map-dot two">
          <svg width="18" height="18" viewBox="0 0 20 20">
            <rect x="5" y="4" width="8" height="12" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
            <circle cx="15" cy="10" r="3" fill="currentColor" />
          </svg>
        </div>
        <svg class="position-arrow" viewBox="0 0 64 64" aria-hidden="true">
          <path d="M32 5 54 58 32 47 10 58Z" fill="#1768e8" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" />
        </svg>
        <div class="road-pill">県道244号</div>
        <div class="brand" aria-hidden="true">
          <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
        </div>
      </div>

      <section class="turn-banner" aria-label="次の案内">
        <div class="turn-icon">
          <svg width="46" height="46" viewBox="0 0 48 48" aria-hidden="true">
            <path d="M24 40V10" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" />
            <path d="M12 22 24 10l12 12" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>
        <div class="turn-main">
          <div class="turn-distance">800 m</div>
          <div class="turn-place">後飯町</div>
        </div>
      </section>

      <div class="control-column" aria-label="地図操作">
        <button class="circle-button" type="button" aria-label="設定">
          <svg width="32" height="32" viewBox="0 0 32 32" aria-hidden="true">
            <path d="M13.7 4.5h4.6l1 3.1 2.8 1.1 2.9-1.5 3.2 3.3-1.5 2.8 1.1 2.9 3.1 1v4.5l-3.1 1-1.1 2.8 1.5 2.9-3.2 3.2-2.9-1.5-2.8 1.1-1 3.1h-4.6l-1-3.1-2.8-1.1-2.9 1.5-3.2-3.2 1.5-2.9-1.1-2.8-3.1-1v-4.5l3.1-1 1.1-2.9-1.5-2.8 3.2-3.3 2.9 1.5 2.8-1.1Z" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round" />
            <circle cx="16" cy="19.5" r="4.7" fill="none" stroke="currentColor" stroke-width="2.4" />
          </svg>
        </button>
        <button class="circle-button" type="button" aria-label="音量">
          <svg width="34" height="34" viewBox="0 0 34 34" aria-hidden="true">
            <path d="M5 20v-6h5l7-6v18l-7-6Z" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linejoin="round" />
            <path d="M22 12.5a6 6 0 0 1 0 9M25.5 9a11 11 0 0 1 0 16" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" />
          </svg>
        </button>
        <button class="circle-button compass" type="button" aria-label="方位">
          <svg width="34" height="34" viewBox="0 0 34 34" aria-hidden="true">
            <path d="M25.5 8 20.8 25.6 16.5 18.2 8.7 16.5Z" fill="currentColor" />
            <path d="M20.8 25.6 16.5 18.2 8.7 16.5Z" fill="#ffffff" opacity="0.95" />
          </svg>
        </button>
        <button class="circle-button warn" type="button" aria-label="警告">
          <svg width="34" height="34" viewBox="0 0 34 34" aria-hidden="true">
            <path d="M17 5.5 29 27.5H5Z" fill="none" stroke="currentColor" stroke-width="2.7" stroke-linejoin="round" />
            <path d="M17 13.5v7" stroke="currentColor" stroke-width="2.7" stroke-linecap="round" />
            <circle cx="17" cy="24" r="1.7" fill="currentColor" />
          </svg>
        </button>
      </div>

      <section class="eta-card" aria-label="到着予定">
        <div class="eta-line">
          <span class="eta-minutes">6 分</span>
          <svg class="leaf" width="28" height="28" viewBox="0 0 28 28" aria-hidden="true">
            <path d="M22.8 5.4C13 4.9 7.3 9 7.7 16.8c.3 4.7 3.8 7.3 7.7 6.5 5.9-1.1 8.3-8 7.4-17.9Z" fill="none" stroke="currentColor" stroke-width="2.5" />
            <path d="M8.7 10.8c4 3.7 7.1 7 9.5 11.2" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
          </svg>
        </div>
        <div class="eta-distance">3.4 km · 0:25</div>
        <div class="eta-actions">
          <button class="action-button close" type="button" aria-label="案内終了">
            <svg width="30" height="30" viewBox="0 0 30 30" aria-hidden="true">
              <path d="M7 7 23 23M23 7 7 23" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
            </svg>
          </button>
          <button class="action-button" type="button" aria-label="経路オプション">
            <svg width="32" height="32" viewBox="0 0 32 32" aria-hidden="true">
              <path d="M8 5v8M4.5 9.5 8 13l3.5-3.5M16 27V14c0-3.5 2.5-6 6-6h4" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" />
              <path d="M23 4 27 8l-4 4" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
          <button class="action-button" type="button" aria-label="拡大">
            <svg width="32" height="32" viewBox="0 0 32 32" aria-hidden="true">
              <circle cx="16" cy="16" r="11.5" fill="none" stroke="currentColor" stroke-width="2.6" />
              <path d="M16 10v12M10 16h12" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" />
            </svg>
          </button>
          <button class="action-button" type="button" aria-label="経由地">
            <svg width="34" height="34" viewBox="0 0 34 34" aria-hidden="true">
              <circle cx="10" cy="8" r="3.3" fill="none" stroke="currentColor" stroke-width="2.7" />
              <path d="M10 11.5v7.8c0 4.3 3.5 7.7 7.7 7.7h4.8" fill="none" stroke="currentColor" stroke-width="2.7" stroke-linecap="round" />
              <circle cx="25" cy="22" r="5" fill="none" stroke="currentColor" stroke-width="2.7" />
              <path d="M25 17v10M20 22h10" fill="none" stroke="currentColor" stroke-width="2.7" stroke-linecap="round" />
            </svg>
          </button>
          <button class="action-button" type="button" aria-label="その他">
            <svg width="34" height="34" viewBox="0 0 34 34" aria-hidden="true">
              <circle cx="9" cy="17" r="2.3" fill="currentColor" />
              <circle cx="17" cy="17" r="2.3" fill="currentColor" />
              <circle cx="25" cy="17" r="2.3" fill="currentColor" />
            </svg>
          </button>
        </div>
      </section>

      <div class="zoom-control" aria-label="ズーム操作">
        <button class="zoom-button" type="button" aria-label="拡大">
          <svg width="30" height="30" viewBox="0 0 30 30" aria-hidden="true">
            <path d="M15 6v18M6 15h18" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" />
          </svg>
        </button>
        <div class="zoom-divider"></div>
        <button class="zoom-button" type="button" aria-label="縮小">
          <svg width="30" height="30" viewBox="0 0 30 30" aria-hidden="true">
            <path d="M6 15h18" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" />
          </svg>
        </button>
      </div>
    </main>
  </body>
</html>
